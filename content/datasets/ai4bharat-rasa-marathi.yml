starter_idea:
  Build a Marathi speech emotion recognition system for call center analytics to detect customer sentiment from
  voice.
build_ideas:
  - Create a Marathi mental health screening tool that detects emotional distress signals from speech patterns
  - Develop an emotion-aware Marathi TTS system that generates speech with appropriate emotional intonation
  - Build a real-time call center dashboard that tracks customer emotion trends during Marathi-language support calls
quick_start:
  "from datasets import load_dataset\nds = load_dataset('ai4bharat/rasa', 'mr', split='train', streaming=True)\n\
  for i, ex in enumerate(ds):\n    print(f\"Emotion: {ex['emotion']}, Text: {ex['text'][:60]}...\")\n    if i >= 4: break\n"
