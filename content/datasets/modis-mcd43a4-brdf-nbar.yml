description: Daily BRDF-corrected surface reflectance at 500m resolution from Terra+Aqua MODIS (7 spectral bands from visible to SWIR). Removes sun-angle and directional effects for consistent multi-temporal analysis. Superior to standard reflectance products for land cover classification and time-series spectral analysis.
