  - hi
  - en
license: Open (IndiaAI Mission)
ai_use_cases:
  - Marathi LLM fine-tuning for government chatbots
  - OCR of scanned land records and government documents
  - Handwritten Devanagari recognition
  - Speech recognition for rural users
  - Marathi math word problem solving
