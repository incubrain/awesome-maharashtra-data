title: AIKOSH IIT Bombay Indic Datasets (IndiaAI)
homepage: https://aikosh.indiaai.gov.in/
category: vision-ocr-multimodal
description:
  Collection of 16 Indic language datasets from IIT Bombay hosted on IndiaAI's AIKOSH platform as part of the BharatGen
  initiative. Includes handwritten and printed Devanagari script images, scanned table recognition data, 78+ hours of multilingual
  audio, QA pairs, and math word problems. Covers Marathi plus 9 other Indian languages.
modality: multimodal
size: 16 datasets; handwritten/printed script images, 78+ hrs audio, QA pairs
language:
