title: Gridded GDP & HDI (1990-2022)
homepage: https://www.nature.com/articles/s41597-025-04487-x
category: economy-labour-finance
description:
  Downscaled gridded GDP per capita (PPP) and Human Development Index at admin-2 (municipality/district) level
  for 1990-2022 using machine learning. Maharashtra districts covered, enabling economic inequality and development tracking.
modality: tabular-gridded
size: ~500 MB (global), ~5 MB (MH subset)
language:
  - en
license: CC BY 4.0
ai_use_cases:
  - District-level economic inequality mapping
  - Development program targeting
  - Investment and industry location analysis
  - Urbanization-prosperity correlation
  - Time-series economic growth modeling
maharashtra_specific: false
extraction_status: subset_needed
