direct_download_url: https://datadryad.org/dataset/doi:10.5061/dryad.dk1j0
paper_url: https://www.nature.com/articles/s41597-025-04487-x
github_url: ""
organization: Multiple (Academic)
format: GeoTIFF / CSV
update_frequency: periodic
citation: ""
last_verified: "2026-03-07"
schema:
  - field: admin2_code
    type: string
    description: Administrative level 2 (district/municipality) code
  - field: year
    type: integer
    description: Year of estimate (1990-2022)
  - field: gdp_ppp
    type: float
    description: GDP per capita in PPP (constant 2017 international $)
  - field: hdi
    type: float
    description: Human Development Index (0-1)
starter_idea: Build a sub-district level economic development mapper for Maharashtra using gridded GDP and HDI data.
build_ideas:
