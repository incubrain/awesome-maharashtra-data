title: CulturaX Marathi
homepage: https://huggingface.co/datasets/uonlp/CulturaX
category: language-nlp
description:
  Large-scale multilingual web corpus with a substantial Marathi subset, combining mC4 and OSCAR data with extensive
  cleaning and deduplication. Provides high-quality pre-training data for Marathi language models with better filtering than
  raw web crawls.
modality: text
size: Billions of tokens across 167 languages; significant Marathi subset
language:
  - mr
license: Various (mC4 + OSCAR terms)
ai_use_cases:
  - Marathi language model pre-training
  - Text quality filtering research
  - Web content analysis
  - Domain-specific corpus extraction
maharashtra_specific: false
extraction_status: ready
huggingface_url: https://huggingface.co/datasets/uonlp/CulturaX
direct_download_url: ""
paper_url: https://arxiv.org/abs/2309.09400
github_url: ""
organization: UoNLP (University of Oregon NLP)
format: Parquet / JSONL
update_frequency: static
citation: "Nguyen et al. 2023. CulturaX: A Cleaned, Enormous, and Multilingual Dataset for Large Language Models in 167 Languages."
last_verified: "2026-03-09"
schema:
  - field: text
    type: string
    description: Cleaned Marathi web text
  - field: url
    type: string
    description: Source URL
  - field: timestamp
    type: string
    description: Crawl timestamp
starter_idea: Build a high-quality Marathi pre-training corpus by combining CulturaX with quality filtering for LLM training.
build_ideas:
  - Create an automated Marathi content curation pipeline using CulturaX quality signals to build domain-specific corpora
  - Develop a temporal analysis of Marathi web content to track language evolution and new vocabulary emergence
  - Build a Marathi web content classifier that identifies educational, news, government, and commercial domains
quick_start:
  "from datasets import load_dataset\nds = load_dataset('uonlp/CulturaX', 'mr', split='train', streaming=True)\n\
  for i, ex in enumerate(ds):\n    print(f\"URL: {ex['url'][:60]}\")\n    print(f\"Text: {ex['text'][:80]}...\\n\")\n    if\
  \ i >= 4: break\n"
