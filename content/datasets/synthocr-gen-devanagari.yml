title: SynthOCR-Gen - Synthetic OCR Data Generator for Devanagari
homepage: https://arxiv.org/abs/2601.16113
category: benchmarks-tools-dialects
description:
  Open-source synthetic OCR dataset generation tool validated on Devanagari and other low-resource scripts.
  Generates unlimited synthetic training images by rendering text from Unicode corpora using diverse TTF/OTF
  fonts with configurable degradation effects (blur, noise, skew, low DPI, ink bleed, paper texture). Combined
  with Marathi text corpora and 283+ Devanagari fonts, this tool can generate millions of labeled training
  images for printed Marathi OCR without manual annotation. Essential for data augmentation in low-resource
  OCR scenarios.
modality: Tool (synthetic image generator)
size: Unlimited generation capacity; requires input text corpus + fonts
language:
