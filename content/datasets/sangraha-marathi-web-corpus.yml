title: Sangraha Marathi Web Corpus
homepage: https://huggingface.co/datasets/ai4bharat/sangraha
category: language-nlp
description:
  Large-scale Indic web corpus by AI4Bharat with curated Marathi subset from Common Crawl, featuring language identification,
  quality filtering, and deduplication. Includes verified, unverified, and synthetic (back-translated) splits for comprehensive
  Marathi language model training.
modality: text
size: Large-scale web corpus; Marathi subset with millions of documents
language:
  - mr
license: CC-BY-4.0
ai_use_cases:
  - Marathi LLM pre-training and continued pre-training
  - Domain-specific fine-tuning data extraction
  - Web content quality analysis
  - Marathi text generation
maharashtra_specific: false
extraction_status: ready
huggingface_url: https://huggingface.co/datasets/ai4bharat/sangraha
direct_download_url: ""
paper_url: https://arxiv.org/abs/2403.06350
github_url: ""
organization: AI4Bharat
format: JSONL / Parquet
update_frequency: static
citation: "Ai4bharat. 2024. Sangraha: A Large-scale Indic Data Synthesis and Curation Pipeline."
last_verified: "2026-03-09"
schema:
  - field: text
    type: string
    description: Curated Marathi web text
  - field: source
    type: string
    description: Source of the text
starter_idea:
  Use Sangraha's curated Marathi web corpus for training a high-quality Marathi language model with better data
  quality than raw crawls.
build_ideas:
  - Create a comparative study of Marathi LLM pre-training quality using Sangraha vs raw web crawl data
  - Develop a Marathi writing quality benchmark using Sangraha's curated text as reference for text generation evaluation
  - Build a Marathi content filtering pipeline that replicates Sangraha's curation approach for new web crawl data
quick_start:
  "from datasets import load_dataset\nds = load_dataset('ai4bharat/sangraha', 'verified.mar', split='train', streaming=True)\n\
  for i, ex in enumerate(ds):\n    print(f\"Text: {ex['text'][:100]}...\")\n    if i >= 4: break\n"
