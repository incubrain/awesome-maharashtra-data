title: MoDeTrans - Modi Script Document Transliteration Dataset
homepage: https://arxiv.org/abs/2503.13060
category: vision-ocr-multimodal
description:
  Dataset of 2,043 historical Modi script document images paired with Devanagari transliterations. Modi was the
  official script for writing Marathi from the 12th century until the British colonial period when Devanagari
  replaced it. This dataset enables training vision-language models (MoScNet architecture) to transliterate Modi
  documents into modern Devanagari, unlocking centuries of Marathi historical records including Peshwa-era
  administrative documents, Shivaji Maharaj's correspondence, and Maratha empire legal records.
modality: Image (historical document scans with Devanagari transliterations)
size: 2,043 document images with parallel Devanagari text
