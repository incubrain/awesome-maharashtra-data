title: AI4Bharat Kathbath (Marathi)
homepage: https://huggingface.co/datasets/ai4bharat/Kathbath
category: speech-audio
description:
  Crowdsourced human-labeled ASR dataset for 12 Indian languages including Marathi, collected via the Karya platform
  with approximately 140 hours per language.
modality: speech+text
size: ~140 hrs Marathi (1,684 hrs total across 12 langs)
language:
  - mr
license: CC0-1.0
ai_use_cases:
  - ASR training
  - Speech benchmarking
  - Voice-based applications
  - Marathi speech recognition
maharashtra_specific: false
huggingface_url: https://huggingface.co/datasets/ai4bharat/Kathbath
direct_download_url: ""
paper_url: ""
github_url: ""
organization: AI4Bharat
format: WAV
update_frequency: static
citation: ""
last_verified: "2026-03-07"
schema:
  - field: audio
    type: audio
    description: Audio waveform of the speech recording (WAV format)
  - field: sentence
    type: string
    description: Human-verified transcription of the audio
  - field: locale
    type: string
    description: Language locale code (mr_IN for Marathi)
  - field: split
    type: string
    description: Dataset split (train, valid, test_known, test_unknown)
starter_idea:
  Build a production-ready Marathi speech-to-text API for customer service automation in Maharashtra banks and
  telecom companies.
build_ideas:
  - Create a Marathi dictation app for government officials to transcribe meeting notes and official correspondence in real-time
  - Develop a voice-based form filling system for illiterate citizens accessing Maharashtra government services
  - Build an automated Marathi subtitling service for educational video content from Maharashtra state board schools
quick_start:
  "from datasets import load_dataset\nds = load_dataset('ai4bharat/Kathbath', 'mr', split='train', streaming=True)\n\
  for i, ex in enumerate(ds):\n    print(f\"Sentence: {ex['sentence'][:80]}...\")\n    if i >= 4: break\n"
