title: NASA GPM IMERG Precipitation (V07)
homepage: "https://gpm.nasa.gov/data/imerg"
category: environment-climate-disaster
description: Global precipitation estimates at 0.1° (~10km) resolution, half-hourly from June 2000 to present. Maharashtra subset enables hyper-local flood prediction, drought monitoring, and agricultural water management across all 36 districts.
modality: raster-gridded
size: ~5 TB (global, full history), ~10 GB (MH daily subset)
language:
  - en
license: Open (NASA)
ai_use_cases:
  - Flood early warning systems for Maharashtra rivers
  - Drought severity mapping at taluka level
  - Crop water requirement estimation
  - Urban stormwater drainage planning
  - Reservoir inflow forecasting
maharashtra_specific: false
extraction_status: subset_needed
huggingface_url: ""
direct_download_url: "https://disc.gsfc.nasa.gov/datasets/GPM_3IMERGDF_07/summary"
paper_url: ""
github_url: ""
organization: NASA Goddard Space Flight Center
format: HDF5 / NetCDF
update_frequency: daily
citation: ""
last_verified: "2026-03-07"
schema:
  - field: lat
    type: float
    description: "Latitude (-90 to 90, 0.1° steps)"
  - field: lon
    type: float
    description: "Longitude (-180 to 180, 0.1° steps)"
  - field: time
    type: datetime
    description: "Observation timestamp (half-hourly or daily)"
  - field: precipitation
    type: float
    description: "Merged precipitation estimate (mm/hr)"
  - field: precipitationQualityIndex
    type: float
    description: "Quality index (0=worst, 1=best)"
