title: EM-DAT Disaster Database
homepage: https://public.emdat.be/
category: environment-climate-disaster
description:
  Maharashtra Events — International disaster database recording natural and technological disasters in Maharashtra
  including floods, droughts, cyclones, and earthquakes since 1900
modality: Tabular (Excel)
size: Event-level, 1900–present
language:
  - en
license: Open (non-commercial)
ai_use_cases:
  - Disaster risk assessment
  - historical loss modelling
  - climate adaptation planning
maharashtra_specific: true
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: ""
organization: Centre for Research on the Epidemiology of Disasters (CRED)
format: CSV
update_frequency: static
citation: ""
last_verified: "2026-03-07"
schema:
  - field: country
    type: string
    description: Country name
  - field: disaster_type
    type: string
    description: Type of disaster (flood, drought, etc.)
  - field: location
    type: string
    description: Affected location description
  - field: total_deaths
    type: int
    description: Total deaths reported
  - field: total_affected
    type: int
    description: Total people affected
  - field: year
    type: int
    description: Disaster year
starter_idea: Build a disaster risk assessment model for Maharashtra using historical disaster frequency and impact data.
build_ideas:
  - Create a Maharashtra disaster preparedness index combining historical disaster data with current vulnerability indicators
  - Develop a disaster insurance pricing model using historical loss data for Maharashtra regions
  - Build a climate change impact tracker showing how disaster frequency and severity changed over decades in Maharashtra
quick_start: "# Download from https://www.emdat.be/

  import pandas as pd

  df = pd.read_csv('emdat_india.csv')

  mh = df[df['Location'].str.contains('Maharashtra', na=False)]

  print(f'Maharashtra disasters: {len(mh)}')

  print(mh.groupby('Disaster_Type').size().sort_values(ascending=False))

  "
