title: GHS-POP Population Grid (1975-2030)
homepage: https://human-settlement.emergency.copernicus.eu/ghs_pop2023.php
category: governance-census-demographics-legal
description:
  Global population grid at 100m resolution from 1975 to 2030 in 5-year intervals, disaggregated using GHSL built-up
  surface and CIESIN census data. Maharashtra subset enables historical population density analysis across 50+ years.
modality: raster-gridded
size: ~10 GB (global per epoch), ~150 MB (MH subset)
language:
  - en
license: Open (Copernicus/EC)
ai_use_cases:
  - Historical population density trend analysis
  - Urban-rural migration pattern detection
  - Public facility allocation planning
  - Electoral redistricting analysis
  - Demographic transition modeling
maharashtra_specific: false
extraction_status: subset_needed
huggingface_url: ""
direct_download_url: https://human-settlement.emergency.copernicus.eu/download.php
paper_url: ""
github_url: ""
organization: European Commission JRC
format: GeoTIFF
update_frequency: biennial
citation: ""
last_verified: "2026-03-07"
schema:
  - field: population
    type: float
    description: Estimated population count per grid cell
  - field: resolution
    type: string
    description: Grid resolution (100m, 250m, 1km)
  - field: year
    type: int
    description: Reference year
starter_idea:
  Build a population exposure analysis tool for Maharashtra combining gridded population with hazard maps for
  disaster planning.
build_ideas:
  - Create a service area optimizer for Maharashtra healthcare facilities using gridded population for catchment analysis
  - Develop a population density time-series for Maharashtra showing urbanization patterns at fine spatial resolution
  - Build a disaster impact estimator that overlays population grids with flood/earthquake hazard zones in Maharashtra
