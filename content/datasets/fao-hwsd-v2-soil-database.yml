title: Harmonized World Soil Database v2.0 (FAO/ISRIC)
homepage: https://www.fao.org/soils-portal/data-hub/soil-maps-and-databases/harmonized-world-soil-database-v2/en/
category: agriculture-rural
description:
  Global soil properties database at ~1km (30 arc-second) resolution with 7 depth layers. Provides soil type, texture,
  pH, organic carbon, nutrient content, and water holding capacity from national ground surveys and lab data. Critical for
  crop suitability mapping and yield modeling in Maharashtra.
modality: gridded
size: ~1km resolution; 7 depth layers; 40+ soil properties; global coverage
language:
  - en
license: CC-BY-NC-SA-3.0-IGO
ai_use_cases:
  - Crop suitability mapping for Maharashtra districts
  - Soil fertility assessment for precision agriculture
  - Drought vulnerability assessment from water capacity
  - Carbon stock estimation for climate modeling
  - Soil erosion risk prediction in Western Ghats
maharashtra_specific: false
extraction_status: subset_needed
huggingface_url: ""
direct_download_url: https://www.fao.org/soils-portal/data-hub/soil-maps-and-databases/harmonized-world-soil-database-v2/en/
paper_url: ""
github_url: ""
organization: FAO / ISRIC
format: Raster / SQLite database
update_frequency: static
citation: ""
last_verified: "2026-03-09"
schema:
  - field: soil_unit
    type: string
    description: FAO soil unit code
  - field: texture
    type: string
    description: Soil texture class
  - field: organic_carbon
    type: float
    description: Organic carbon content percentage
  - field: ph
    type: float
    description: Soil pH value
starter_idea: Build a soil characteristic lookup service for Maharashtra that returns detailed soil properties for any location.
build_ideas:
  - Create a global-to-local soil data fusion tool combining FAO HWSD with Maharashtra soil health card data
  - Develop a soil erosion risk mapper for Maharashtra using soil properties and terrain data
  - Build a carbon sequestration potential estimator for Maharashtra farms using soil organic carbon data
