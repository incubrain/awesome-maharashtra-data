title: MRSAC Geoportal
homepage: https://geoportal.mrsac.org.in/explore/
category: geospatial-gis
description:
  Maharashtra Remote Sensing Application Centre geospatial layers covering land use, admin boundaries, watersheds,
  and thematic maps for all 36 districts at 1:50K scale.
modality: geospatial
size: 50+ layers; state-wide coverage at 1:50K scale
language:
  - mr
  - en
license: Government-Open
ai_use_cases:
  - Land use classification
  - Drought monitoring
  - Watershed delineation
  - Urban sprawl analysis
maharashtra_specific: true
huggingface_url: ""
direct_download_url: https://mrsac.gov.in/MRSAC/
paper_url: ""
github_url: ""
organization: Maharashtra Remote Sensing Application Centre (MRSAC), Government of Maharashtra
format: Shapefile
update_frequency: annual
citation: ""
last_verified: "2026-03-07"
schema:
  - field: geometry
    type: geojson
    description: Polygon or multipolygon boundary geometry
  - field: layer_name
    type: string
    description: Thematic layer (e.g. LULC, admin boundaries, watersheds)
  - field: district
    type: string
    description: Maharashtra district name
  - field: attribute
    type: string
    description: Layer-specific attribute (land use class, watershed code, etc.)
starter_idea: Create a visual dashboard showing land cover changes to track deforestation or illegal mining in Maharashtra.
build_ideas:
  - Build a change-detection alert system that compares annual land use layers and flags rapid conversions for environmental
    enforcement
  - Create a precision agriculture app overlaying MRSAC land use with soil and crop data for optimized resource allocation
  - Develop an urban sprawl tracker for Maharashtra cities using time-series land use layers
quick_start:
  "# Access WMS layers from MRSAC Geoportal\nimport folium\nm = folium.Map(location=[19.5, 76], zoom_start=7)\n\
  folium.WmsTileLayer(\n    url='https://geoportal.mrsac.org.in/geoserver/wms',\n    layers='mrsac:lulc', fmt='image/png',\
  \ transparent=True,\n    name='MRSAC Land Use'\n).add_to(m)\nm.save('maharashtra_landuse.html')\n"
