starter_idea:
  Build a Marathi news aggregation and auto-tagging service that categorizes articles by topic for personalized
  feeds.
build_ideas:
  - Create a breaking-news detection system that classifies and prioritizes incoming Marathi news by topic and urgency
  - Develop a personalized Marathi news digest app that learns user preferences and recommends stories from their favourite
    categories
  - Build a media monitoring service for Maharashtra government officials that tracks coverage by topic across Marathi publications
quick_start:
  "from datasets import load_dataset\nds = load_dataset('l3cube-pune/MahaNews')\nfor ex in ds['train'][:5]:\n \
  \   print(f\"[{ex['label']}] {ex['text'][:80]}...\")\n"
