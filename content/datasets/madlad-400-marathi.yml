organization: Google / Allen AI
format: Parquet
update_frequency: static
citation: ""
last_verified: "2026-03-09"
schema:
  - field: text
    type: string
    description: Marathi web-crawled text document
starter_idea: Use MADLAD-400 Marathi data for large-scale language model pre-training with quality-filtered web text.
build_ideas:
  - Create a Marathi corpus deduplication pipeline comparing MADLAD, CC-100, and OSCAR to build the cleanest combined pre-training
    dataset
  - Develop a Marathi text quality classifier trained to distinguish high-quality from noisy web text for corpus curation
  - Build a domain distribution analyzer that maps the topical coverage of MADLAD Marathi data compared to other web corpora
quick_start:
  "from datasets import load_dataset\nds = load_dataset('allenai/MADLAD-400', 'mr', split='clean', streaming=True)\n\
  for i, ex in enumerate(ds):\n    print(f\"Text: {ex['text'][:100]}...\")\n    if i >= 4: break\n"
