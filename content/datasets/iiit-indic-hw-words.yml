title: IIIT-INDIC-HW-WORDS - Large-Scale Handwritten Indic Words
homepage: https://cvit.iiit.ac.in/research/projects/cvit-projects/iiit-indic-hw-words
category: vision-ocr-multimodal
description:
  Massive handwritten word dataset containing 872,000 word instances across 10 Indic scripts including Devanagari,
  written by 135 writers. Each writer contributed approximately 6,460 word instances. Includes word-level bounding
  box annotations and Unicode transcriptions. The scale and writer diversity make this essential for training robust
  handwritten text recognition systems that generalize across writing styles. Devanagari subset directly applicable
  to Marathi handwriting recognition.
modality: Image (handwritten word crops with transcriptions)
size: 872K word instances; 135 writers; 10 Indic scripts
language:
  - mr
  - hi
  - bn
  - ta
  - te
  - kn
  - ml
  - gu
  - pa
  - or
license: Research use (CVIT/IIIT-H)
ai_use_cases:
  - Large-scale handwritten Marathi word recognition
  - Writer-independent handwriting model training
  - Cross-script transfer learning for handwritten OCR
  - Handwriting style analysis and generation
maharashtra_specific: false
extraction_status: subset_needed
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: ""
organization: CVIT, IIIT Hyderabad
format: PNG/JPEG with text labels
update_frequency: static
citation: ""
last_verified: "2026-03-12"
schema:
