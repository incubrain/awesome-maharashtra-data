starter_idea:
  Build a Marathi read-speech ASR model optimized for formal reading scenarios like news broadcasting and audiobook
  narration.
build_ideas:
  - Create an audiobook generation quality checker that compares TTS output against human read-speech patterns
  - Develop a Marathi reading fluency assessment tool for schools that evaluates student oral reading performance
  - Build a pronunciation training app for Marathi language learners using native read-speech as reference
quick_start:
  "from datasets import load_dataset\nds = load_dataset('ai4bharat/IndicVoices-R', 'mr', split='train', streaming=True)\n\
  for i, ex in enumerate(ds):\n    print(f\"Transcript: {ex['transcript'][:80]}...\")\n    if i >= 4: break\n"
