title: MODI-HChar - Historical Modi Script Handwritten Character Dataset
homepage: https://ieee-dataport.org/documents/modi-hchar-historical-modi-script-handwritten-character-dataset
category: vision-ocr-multimodal
description:
  Large-scale handwritten Modi script character dataset containing 575,920 character images across 57 classes
  (10 numerals, 12 vowels, 35 consonants). Modi script was the primary writing system for Marathi from the
  12th to 20th century. This character-level dataset enables training classifiers for the foundational character
  recognition stage of historical Marathi document OCR. The scale (575K images) provides sufficient variety
  for robust recognition across different historical writing styles.
modality: Image (handwritten character crops)
size: 575,920 character images; 57 classes
language:
  - mr
license: CC BY 4.0
ai_use_cases:
  - Modi script character classification
  - Historical Marathi OCR character recognition stage
  - Script identification (Modi vs. Devanagari)
  - Historical handwriting analysis
maharashtra_specific: true
extraction_status: ready
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: ""
organization: Research community
format: PNG/JPEG
update_frequency: static
citation: ""
last_verified: "2026-03-12"
schema:
  - field: image
    type: image
    description: Cropped handwritten Modi script character image
  - field: character_class
    type: string
    description: Modi character label (vowel, consonant, or numeral)
  - field: class_id
    type: int
    description: Numeric class identifier (0-56)
starter_idea: Train a Modi script character classifier achieving high accuracy across all 57 character classes.
build_ideas:
  - Create a Modi-Devanagari character mapping tool that visually maps Modi characters to their Devanagari equivalents
  - Develop a Modi script handwriting recognition model combining character classification with word-level context
  - Build a historical document transcription assistant that segments Modi text and classifies individual characters
quick_start: |
  # Download from IEEE DataPort or Kaggle
  # https://www.kaggle.com/datasets/msd6013/modi-hdc-historical-handwritten-modi-script
  import torch
  from torchvision import datasets, transforms

  transform = transforms.Compose([
      transforms.Grayscale(),
      transforms.Resize((32, 32)),
      transforms.ToTensor()
  ])
  # Load as image folder dataset (57 class subdirectories)
  dataset = datasets.ImageFolder('modi_hchar/', transform=transform)
  print(f"Total images: {len(dataset)}, Classes: {len(dataset.classes)}")
