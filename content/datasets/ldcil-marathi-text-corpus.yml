title: LDC-IL Marathi Gold Standard Text Corpus
homepage: https://data.ldcil.org/a-gold-standard-marathi-raw-text-corpus
category: language-nlp
description:
  Curated Marathi text corpus of 2,157,109 words across 678 titles collected from books, magazines, and newspapers
  by the Linguistic Data Consortium for Indian Languages (LDC-IL) under the Ministry of Electronics and IT. The
  corpus includes newspaper-sourced Marathi text that can serve as ground-truth for synthetic OCR training data
  generation — render the text using Devanagari fonts with degradation effects to create paired image-text training
  data. Also valuable as a language model corpus for post-OCR beam search decoding and error correction.
modality: Text (Marathi)
size: 2,157,109 words; 678 titles
