format: CSV
update_frequency: daily
citation: ""
last_verified: "2026-03-07"
starter_idea: Build a real-time mandi price alert app for MH farmers
build_ideas:
  - "SMS/WhatsApp price alert system for onion, soybean, and cotton farmers"
  - "Price arbitrage finder showing which APMC pays highest for a commodity"
  - "Seasonal price forecaster to help farmers time their market entry"
quick_start: |
  import pandas as pd
  df = pd.read_csv("agmarknet_prices.csv")
  # Filter Maharashtra onion prices
  mh_onion = df[(df["state"] == "Maharashtra") & (df["commodity"] == "Onion")]
  print(mh_onion[["market", "modal_price"]].groupby("market").mean())
