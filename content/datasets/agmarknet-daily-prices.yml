title: AgMarkNet Daily Market Prices
homepage: "https://agmarknet.gov.in/"
category: agriculture-rural
description: Daily wholesale mandi prices (min, max, modal) for 300+ commodities across Maharashtra APMCs, with cleaned data also available via CEDA Ashoka API covering 2000-2023.
