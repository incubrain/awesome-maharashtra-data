title: AI4Bharat Samanantar (Marathi)
homepage: "https://huggingface.co/datasets/ai4bharat/samanantar"
category: language-nlp
description: Largest publicly available English-Marathi parallel corpus with 3.32 million sentence pairs for machine translation.
modality: parallel-text
size: 3.32M sentence pairs
language:
  - mr
  - en
license: CC0-1.0
ai_use_cases:
  - Machine translation
  - Cross-lingual transfer learning
  - Bilingual dictionary extraction
  - Parallel corpus mining
maharashtra_specific: true
huggingface_url: "https://huggingface.co/datasets/ai4bharat/samanantar"
direct_download_url: ""
paper_url: ""
github_url: ""
organization: AI4Bharat
format: Parquet
update_frequency: static
citation: ""
last_verified: "2026-03-07"
schema:
  - field: src
    type: string
    description: Source sentence in English
  - field: tgt
    type: string
    description: Parallel translation in Marathi
  - field: src_lang
    type: string
    description: "Source language code (en)"
  - field: tgt_lang
    type: string
    description: "Target language code (mr)"
  - field: data_source
    type: string
    description: Origin corpus the sentence pair was mined from
starter_idea: Build an English-to-Marathi translation API for government schemes
build_ideas:
  - "WhatsApp bot that translates government scheme notifications to Marathi"
  - "Browser extension that translates English web pages to Marathi in real-time"
  - "Bilingual Marathi-English chatbot for tourism and hospitality"
quick_start: |
  from datasets import load_dataset
  ds = load_dataset("ai4bharat/samanantar", "mr")
  print(ds["train"][0])
  # {'src': 'English sentence', 'tgt': 'मराठी वाक्य', ...}
