starter_idea: Fine-tune a remote sensing image classifier pre-trained on NWPU-RESISC45 for Maharashtra land use classification.
build_ideas:
  - Create a transfer learning pipeline from NWPU-RESISC45 to Maharashtra-specific satellite image classification tasks
  - Develop a few-shot scene classifier for rare land use types in Maharashtra using representations learned from RESISC45
  - Build an automated satellite image annotation tool using RESISC45-trained models as initial labelers
