category: vision-ocr-multimodal
description:
  Large-scale remote sensing image scene classification benchmark with 45 scene classes extracted from Google Earth
  covering 100+ countries. Applicable to Maharashtra urban planning, land use mapping, and infrastructure analysis
modality: Satellite imagery (RGB)
size: 31.5K images (256x256 px), 45 classes
language:
  - mr
license: Research use
ai_use_cases:
  - Remote sensing scene classification
  - urban planning
