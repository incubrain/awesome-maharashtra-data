quick_start: '# Download from https://eci.gov.in/

  import pandas as pd

  df = pd.read_csv(''election_results.csv'')

  mh = df[df[''State''] == ''Maharashtra'']

  print(f''Constituencies: {mh["Constituency"].nunique()}'')

  print(mh.groupby(''Party'')[''Votes''].sum().sort_values(ascending=False).head())

  '
