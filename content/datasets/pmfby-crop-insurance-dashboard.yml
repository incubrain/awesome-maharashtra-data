title: PMFBY Crop Insurance Dashboard
homepage: https://pmfby.gov.in/adminStatistics/dashboard
category: agriculture-rural
description:
  Pradhan Mantri Fasal Bima Yojana state/district-level data on farmers insured, premium, claims reported, and
  claims paid for kharif/rabi seasons
modality: Tabular (dashboard/PDF)
size: State-level; seasonal since 2016
language:
  - en
license: Gov Open (GODL)
ai_use_cases:
  - Crop risk modelling
  - insurance premium optimisation
  - drought vulnerability mapping
maharashtra_specific: false
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: ""
organization: Ministry of Agriculture & Farmers Welfare, Government of India
format: CSV
update_frequency: static
citation: ""
last_verified: "2026-03-07"
schema:
  - field: state
    type: string
    description: State name
  - field: district
    type: string
    description: District name
  - field: crop
    type: string
    description: Insured crop name
  - field: farmers_insured
    type: int
    description: Number of farmers who enrolled
  - field: claims_paid_lakh
    type: float
    description: Total claims paid in lakhs
  - field: season
    type: string
    description: Cropping season (Kharif, Rabi)
starter_idea:
  Build a crop insurance analytics platform for Maharashtra that identifies districts with highest claim rates
  and coverage gaps.
build_ideas:
  - Create a crop insurance penetration optimizer that identifies underinsured Maharashtra districts and crops
  - Develop a claims prediction model that estimates expected payouts based on weather and historical claim patterns
  - Build a fraud detection system that flags suspicious patterns in crop insurance claims across Maharashtra
quick_start: '# Download from https://pmfby.gov.in/

  import pandas as pd

  df = pd.read_csv(''pmfby_dashboard.csv'')

  mh = df[df[''State''] == ''Maharashtra'']

  print(f"Maharashtra: {len(mh)} records")

  print(mh.groupby(''District'')[''Claims_Paid_Lakh''].sum().sort_values(ascending=False).head())

  '
