title: Patram-7B - Indian Document Vision-Language Model
homepage: https://huggingface.co/bharatgenai/patram-7b-instruct
category: benchmarks-fairness-dialects-tools
description:
  Open-source 7B parameter vision-language model specifically trained for Indian document understanding, from
  government forms to handwritten pages. Handles the varied structure of scanned and photographed Indian
  documents including Devanagari text. Achieves strong scores on DocVQA (0.855), VisualMRC (0.851), and the
  custom Patram-Bench. Can be fine-tuned for specific Marathi document types (7/12 extracts, certificates,
  forms). Represents the current state-of-the-art in open-source Indian document AI.
modality: Model (Vision-Language Model for document understanding)
size: 7B parameters
language:
  - mr
  - hi
  - en
  - bn
  - ta
  - te
license: Open source (HuggingFace)
ai_use_cases:
