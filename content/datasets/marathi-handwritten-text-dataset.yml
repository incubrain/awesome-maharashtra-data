title: Marathi Handwritten Text Dataset
homepage: "https://www.kaggle.com/datasets/hrushikeshsarode/marathi-handwritten-text-dataset"
category: vision-ocr-multimodal
description: 2,500+ images of full handwritten Marathi text (sentences and paragraphs, not isolated characters). Native speakers wrote pre-designed text covering nearly all Marathi characters, words, and diacritical marks. Fills the gap between character-level datasets (like Devanagari HWR) and real-world handwritten text recognition (HTR).
modality: image
size: "2,500+ images; ~14 MB; full handwritten text passages"
