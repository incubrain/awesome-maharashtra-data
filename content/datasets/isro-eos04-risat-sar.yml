license: OGL-India (ISRO)
ai_use_cases:
  - Flood mapping during Maharashtra monsoon
  - Rice crop area monitoring using temporal SAR
  - Soil moisture mapping at 500m resolution
  - Urban area change detection
  - Dam and reservoir monitoring
