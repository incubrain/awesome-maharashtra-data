title: ISRO EOS-04 (RISAT-1A) C-band SAR
homepage: "https://bhoonidhi.nrsc.gov.in/"
category: geospatial-gis
description: Indian C-band Synthetic Aperture Radar satellite (follow-on to RISAT-1) with StripMAP, ScanSAR, and Spotlight imaging modes. Provides all-weather observation capability with derived products including 500m operational soil moisture. Free open data available via Bhoonidhi for coarser-than-5m resolution modes.
modality: satellite-imagery
size: "1-50m resolution depending on mode; 12-day revisit; India-focused coverage"
