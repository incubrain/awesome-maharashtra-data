title: L3Cube-MahaSTS (Sentence Similarity)
homepage: https://github.com/l3cube-pune/MarathiNLP
category: language-nlp
description:
  Human-annotated Marathi Sentence Textual Similarity dataset with 16,860 sentence pairs scored 0-5. Uniformly
  distributed across score buckets to reduce label bias. Essential for training sentence embeddings, semantic search, and
  retrieval systems in Marathi.
modality: text
size: 16,860 sentence pairs with 0-5 similarity scores
language:
  - mr
license: CC-BY-4.0
ai_use_cases:
  - Marathi sentence embedding training
  - Semantic search and retrieval
  - Duplicate detection in Marathi content
  - Document similarity scoring
maharashtra_specific: true
extraction_status: ready
huggingface_url: https://huggingface.co/datasets/l3cube-pune/MahaSTS
direct_download_url: ""
paper_url: ""
github_url: https://github.com/l3cube-pune/MarathiNLP
organization: L3Cube, Pune
format: CSV / JSON
update_frequency: static
citation: ""
last_verified: "2026-03-09"
schema:
  - field: sentence1
    type: string
    description: First Marathi sentence
  - field: sentence2
    type: string
    description: Second Marathi sentence
  - field: score
    type: float
    description: Semantic similarity score (0-5 scale)
starter_idea:
  Build a Marathi semantic search engine that finds similar documents using sentence embeddings trained on this
  similarity data.
build_ideas:
  - Create a Marathi FAQ chatbot that matches user questions to pre-written answers using semantic similarity scoring
  - Develop a duplicate detection system for Marathi government complaint portals that groups similar citizen grievances
  - Build a Marathi content recommendation engine that suggests similar articles based on sentence-level semantic similarity
quick_start:
  "# Download from https://github.com/l3cube-pune/MarathiNLP\nimport pandas as pd\ndf = pd.read_csv('MahaSTS.csv')\n\
  print(f\"Pairs: {len(df)}\")\nfor _, row in df.head(5).iterrows():\n    print(f\"Score: {row['score']:.1f} | {row['sentence1'][:40]}...\
  \ <-> {row['sentence2'][:40]}...\")\n"
