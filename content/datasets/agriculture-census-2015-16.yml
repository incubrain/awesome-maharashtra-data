quick_start: '# Download from https://agcensus.nic.in/

  import pandas as pd

  df = pd.read_csv(''agriculture_census_2015_16.csv'')

  mh = df[df[''State''] == ''Maharashtra'']

  print(f"Maharashtra records: {len(mh)}")

  print(mh.groupby(''Size_Class'')[''Number_Holdings''].sum())

