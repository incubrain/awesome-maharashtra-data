title: OCR Synthetic Benchmark for Indic Languages
homepage: https://arxiv.org/abs/2205.02543
category: benchmarks-tools-dialects
description:
  Standardized synthetic OCR benchmark dataset containing 90,000 images with ground truth across 23 Indic
  languages including Marathi. Designed for evaluating and comparing OCR system performance across Indian
  scripts in a controlled setting. Uses synthetic rendering with known ground truth to provide clean evaluation
  metrics. Includes varied font sizes, styles, and text lengths. Essential for benchmarking Marathi OCR models
  against other Indic language results and tracking progress toward SOTA.
modality: Image (synthetic text renders with ground truth)
size: 90K images; 23 Indic languages
