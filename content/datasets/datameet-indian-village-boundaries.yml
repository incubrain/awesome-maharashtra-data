quick_start: "import geopandas as gpd

  # Download from https://github.com/datameet/indian_village_boundaries

  gdf = gpd.read_file('indian_village_boundaries.geojson')

  mh = gdf[gdf['state'] == 'Maharashtra']

  print(f'Maharashtra villages: {len(mh)}')

