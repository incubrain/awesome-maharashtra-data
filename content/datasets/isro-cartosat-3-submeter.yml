title: ISRO Cartosat-3 Submeter Imagery
homepage: https://bhoonidhi.nrsc.gov.in/
category: geospatial-gis
description:
  India's highest-resolution civilian optical satellite providing 0.28m panchromatic and 1.1m multispectral imagery.
  Available via Bhoonidhi portal - free for government entities, priced for non-government. Covers 17x17km scenes with exceptional
  detail for building-level urban mapping and infrastructure monitoring.
modality: satellite-imagery
size: 0.28m PAN, 1.1m MX resolution; 17x17km scenes; since November 2019
language:
  - en
license: OGL-India (free for government; priced for NGEs)
ai_use_cases:
  - Building footprint extraction at sub-meter detail
  - Urban infrastructure monitoring in Mumbai/Pune
  - Road and bridge condition assessment
  - Illegal construction detection
  - Precision agriculture at field level
