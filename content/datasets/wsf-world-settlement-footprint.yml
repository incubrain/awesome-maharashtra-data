description: Global human settlement extent at 10m resolution from Sentinel-1 radar and Landsat-8 optical imagery. Maharashtra subset maps built-up area with high accuracy, distinguishing settlements from bare soil — critical for urban planning in rapidly growing tier-2/3 cities.
