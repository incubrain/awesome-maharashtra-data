title: Bhuvan NRSC Open EO Data Archive
homepage: https://bhuvan.nrsc.gov.in/ngmaps
category: geospatial-gis
description:
  ISRO satellite imagery archive including Resourcesat LISS-III, AWiFS, and Cartosat DEM freely downloadable for
  the Maharashtra region, with resolutions from 23.5m to 56m.
modality: geospatial
size: 20+ TB archive; Cartosat DEM 30m, LISS-III 23.5m, AWiFS 56m resolution
language:
  - en
license: Government-Open
ai_use_cases:
  - Crop mapping
  - NDVI time-series analysis
  - DEM-based flood modeling
  - Change detection
maharashtra_specific: false
huggingface_url: ""
direct_download_url: https://bhuvan-app3.nrsc.gov.in/data/
paper_url: ""
github_url: ""
organization: ISRO / National Remote Sensing Centre (NRSC)
format: GeoTIFF
update_frequency: monthly
citation: ""
last_verified: "2026-03-07"
schema:
  - field: tile_id
    type: string
    description: Unique tile/scene identifier for the satellite image
  - field: acquisition_date
    type: date
    description: Date the satellite image was captured
  - field: sensor
    type: string
    description: Sensor type (LISS-III, AWiFS, Cartosat)
  - field: resolution_m
    type: float
    description: Spatial resolution in meters
  - field: bands
    type: list[string]
    description: Spectral bands available (e.g., Green, Red, NIR, SWIR)
starter_idea:
  Build a crop health monitoring system using NDVI time-series from LISS-III imagery to detect drought stress
  in Maharashtra's rainfed agriculture zones.
build_ideas:
  - Create an automated flood extent mapper for Maharashtra using pre/post monsoon satellite imagery with change detection algorithms
  - Develop a deforestation monitoring dashboard for Western Ghats using multi-temporal satellite data with deep learning classification
  - Build a solar farm site suitability model combining Cartosat DEM with land cover classification from LISS-III imagery
