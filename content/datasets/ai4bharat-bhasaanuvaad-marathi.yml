starter_idea:
  Build a Marathi speech-to-speech translation system for real-time interpretation in multilingual Maharashtra
  settings.
build_ideas:
  - Create a Marathi-Hindi real-time interpreter for cross-state government meetings and conferences
  - Develop an audio translation service for Marathi farmers to access Hindi/English agricultural advisories
  - Build a multilingual tourism guide that provides spoken Marathi translations of Hindi/English tourist information
quick_start:
  "from datasets import load_dataset\nds = load_dataset('ai4bharat/BhasaAnuvaad', 'mr-en', split='train', streaming=True)\n\
  for i, ex in enumerate(ds):\n    print(f\"Source: {ex['source_text'][:60]}...\")\n    print(f\"Target: {ex['target_text'][:60]}...\\\
  n\")\n    if i >= 4: break\n"
