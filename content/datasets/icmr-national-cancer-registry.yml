quick_start: '# Download from https://ncdirindia.org/

  import pandas as pd

  df = pd.read_csv(''ncr_data.csv'')

  print(f''Registries: {df["Registry"].nunique()}'')

  print(df.groupby(''Cancer_Site'')[''Incidence_Rate''].mean().sort_values(ascending=False).head())

  '
