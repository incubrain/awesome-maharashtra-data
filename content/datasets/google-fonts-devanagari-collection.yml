title: Google Fonts Devanagari Collection
homepage: https://fonts.google.com/?subset=devanagari
category: benchmarks-tools-dialects
description:
  Collection of 50+ freely licensed Devanagari typefaces from Google Fonts including Tiro Devanagari Marathi
  (designed specifically for Marathi typographic conventions), Noto Sans/Serif Devanagari (comprehensive Unicode
  coverage), Anek Devanagari (variable weight font), and dozens more. Combined with 283+ fonts from
  DevanagariFonts.net, these provide the font diversity needed for synthetic OCR training data generation.
  Critical for training OCR models that generalize across the wide range of fonts used in Marathi printing.
modality: Font files (TTF/OTF)
size: 50+ Google Fonts families; 283+ additional from DevanagariFonts.net
language:
  - mr
  - hi
  - ne
  - sa
license: OFL (SIL Open Font License) / Apache 2.0
