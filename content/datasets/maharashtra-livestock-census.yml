quick_start: "# Download from https://dahd.nic.in/

  import pandas as pd

  df = pd.read_csv('livestock_census.csv')

  mh = df[df['State'] == 'Maharashtra']

  print(mh.groupby('Species')['Count'].sum().sort_values(ascending=False))

