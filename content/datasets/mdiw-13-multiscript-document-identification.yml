title: MDIW-13 - Multi-Script Document Identification in the Wild
homepage: https://zenodo.org/records/6376096
category: vision-ocr-multimodal
description:
  Multi-script document dataset containing 1,135 document images with 13,979 text lines and 86,655 words across
  13 scripts including Devanagari and Roman (Latin). Used in the ICDAR 2021 Script Identification in the Wild
  (SIW) competition. Sources include printed newspapers and handwritten letters with word-level and line-level
  script annotations. Enables training robust script identification models that can distinguish Devanagari from
  Latin and other scripts in real-world mixed-script documents — a critical preprocessing step for bilingual
  Marathi-English OCR pipelines.
modality: Image (document pages with script identification annotations)
size: 1,135 documents; 13,979 text lines; 86,655 words; 13 scripts
