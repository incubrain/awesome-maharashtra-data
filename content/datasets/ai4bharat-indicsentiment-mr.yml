quick_start:
  "from datasets import load_dataset\nds = load_dataset('ai4bharat/IndicSentiment', 'mr', split='train', streaming=True)\n\
  for i, ex in enumerate(ds):\n    print(f\"[{ex['label']}] {ex['text'][:80]}...\")\n    if i >= 4: break\n"
