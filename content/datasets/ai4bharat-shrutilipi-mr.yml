title: AI4Bharat Shrutilipi (Marathi)
homepage: https://huggingface.co/datasets/ai4bharat/Shrutilipi
category: speech-audio
description:
  Pseudo-labeled ASR corpus mined from All India Radio news bulletins for 12 Indian languages, with approximately
  1,020 hours of Marathi speech data.
modality: speech+text
size: ~1,020 hrs Marathi (6,400+ hrs total)
language:
  - mr
license: CC-BY-4.0
ai_use_cases:
  - ASR pre-training
  - News domain ASR
  - Speech-to-text for Marathi
  - Semi-supervised speech learning
maharashtra_specific: false
huggingface_url: https://huggingface.co/datasets/ai4bharat/Shrutilipi
direct_download_url: ""
paper_url: ""
github_url: ""
organization: AI4Bharat
format: WAV
update_frequency: static
citation: ""
last_verified: "2026-03-07"
schema:
  - field: audio
    type: audio
    description: Audio waveform from All India Radio news bulletin
  - field: sentence
    type: string
    description: Pseudo-labeled transcription of the audio
  - field: language
    type: string
    description: Language code (mr for Marathi)
  - field: duration
    type: float
    description: Duration of audio clip in seconds
starter_idea:
  Build a Marathi news transcription service that automatically generates text from radio broadcasts for rural
  information dissemination.
build_ideas:
  - Create a Marathi news summarization pipeline that transcribes radio bulletins and generates concise text summaries for mobile
    alerts
  - Develop a domain-adapted ASR model fine-tuned on formal Marathi news speech for government communication transcription
  - Build an accessibility tool that converts Marathi radio content into searchable text archives for hearing-impaired users
quick_start:
  "from datasets import load_dataset\nds = load_dataset('ai4bharat/Shrutilipi', 'mr', split='train', streaming=True)\n\
  for i, ex in enumerate(ds):\n    print(f\"Duration: {ex['duration']:.1f}s\")\n    print(f\"Text: {ex['sentence'][:80]}...\\\
  n\")\n    if i >= 4: break\n"
