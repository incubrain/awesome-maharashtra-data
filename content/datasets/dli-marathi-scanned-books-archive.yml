title: Digital Library of India - Scanned Marathi Books & Periodicals
homepage: https://archive.org/details/digitallibraryindia
category: vision-ocr-multimodal
description:
  Thousands of scanned Marathi books, periodicals, and historical publications hosted on Internet Archive as part
  of the Digital Library of India project. Contains high-resolution page scans in TIFF/JPEG/PDF format covering
  literature, government publications, religious texts, and historical periodicals. These are raw unannotated scans
  without OCR ground-truth transcriptions — they represent a massive source of real-world printed Marathi page images
  suitable for OCR training data creation, document layout annotation, and historical text digitization projects.
  Includes materials from 19th and 20th century Marathi publishing.
modality: Image (scanned book/periodical pages, unannotated)
size: Thousands of scanned Marathi volumes; millions of page images
language:
  - mr
  - sa
license: Public domain / Out of copyright
ai_use_cases:
  - Raw source material for Marathi OCR training data creation
  - Historical Marathi document digitization
  - Font diversity sampling across printing eras
  - Document degradation modeling from real aged scans
