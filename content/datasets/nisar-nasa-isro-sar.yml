title: NISAR SAR (NASA-ISRO)
homepage: "https://nisar.jpl.nasa.gov/"
category: geospatial-gis
description: NASA-ISRO Synthetic Aperture Radar mission launched July 2025, providing dual-frequency L-band and S-band SAR data at ~8m resolution with 12-day repeat cycle. Measures surface deformation less than 1cm. Critical for tracking land subsidence, earthquake deformation, glacier dynamics, and ecosystem changes across Maharashtra.
