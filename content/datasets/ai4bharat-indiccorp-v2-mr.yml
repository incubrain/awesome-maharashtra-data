starter_idea:
  Train a large Marathi language model on this corpus and fine-tune it for downstream NLP tasks like summarization
  and QA.
build_ideas:
  - Fine-tune a GPT-style model on this data to create a Marathi text generation service for content creation
  - Use this corpus to pre-train domain-specific embeddings for Marathi semantic search applications
  - Build a Marathi autocomplete and writing assistant powered by a language model trained on this corpus
quick_start:
  "from datasets import load_dataset\nds = load_dataset('ai4bharat/IndicCorpV2', 'mr', streaming=True)\nfor i,\
  \ ex in enumerate(ds['train']):\n    print(f\"Text: {ex['text'][:150]}...\")\n    if i >= 2: break\n"
