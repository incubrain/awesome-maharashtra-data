quick_start: '# Download from https://cpcb.nic.in/

  import pandas as pd

  df = pd.read_csv(''cpcb_air_quality.csv'')

  mh = df[df[''State''] == ''Maharashtra'']

  print(f''Stations: {mh["Station"].nunique()}'')

  print(mh.groupby(''City'')[''PM25''].mean().sort_values(ascending=False))

  '
