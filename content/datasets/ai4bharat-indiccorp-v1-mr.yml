starter_idea:
  Pre-train Marathi word embeddings on IndicCorp v1 to create static and contextual embeddings for downstream
  NLP tasks.
build_ideas:
  - Create a Marathi language model pre-training pipeline comparing v1 and v2 corpus quality for downstream task performance
  - Develop a Marathi domain classifier trained on web text to automatically categorize documents by topic
  - Build a Marathi text deduplication tool to identify and remove near-duplicate content across corpora
quick_start:
  "from datasets import load_dataset\nds = load_dataset('ai4bharat/IndicCorp-v1', 'mr', split='train', streaming=True)\n\
  for i, ex in enumerate(ds):\n    print(f\"Text: {ex['text'][:100]}...\\n\")\n    if i >= 4: break\n"
