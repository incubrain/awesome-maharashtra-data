title: JRC Global Surface Water (1984-2021)
homepage: "https://global-surface-water.appspot.com/"
category: environment-climate-disaster
description: Maps of surface water location and temporal distribution from 1984-2021 derived from Landsat imagery at 30m resolution. Maharashtra subset reveals reservoir levels, river width changes, seasonal wetlands, and water body loss over 37 years.
modality: raster-imagery
size: ~150 GB (global), ~2 GB (MH subset)
language:
  - en
license: Open (Copernicus)
ai_use_cases:
  - Reservoir storage estimation and monitoring
  - Drought impact assessment on water bodies
  - Wetland conservation planning
  - Irrigation canal mapping
  - Flood extent historical analysis
maharashtra_specific: false
extraction_status: subset_needed
huggingface_url: ""
direct_download_url: "https://global-surface-water.appspot.com/download"
paper_url: ""
github_url: ""
organization: European Commission JRC
format: GeoTIFF
update_frequency: periodic
citation: ""
last_verified: "2026-03-07"
schema:
  - field: occurrence
    type: integer
    description: "Percentage of time water was present (0-100) over 1984-2021"
  - field: change
    type: integer
    description: "Change in water occurrence intensity between periods"
  - field: seasonality
    type: integer
    description: "Number of months water is present per year"
  - field: recurrence
    type: integer
    description: "Frequency of water return in inter-annual cycle"
  - field: transitions
    type: categorical
    description: "Class of water presence transition (permanent, seasonal, new, lost, etc.)"
