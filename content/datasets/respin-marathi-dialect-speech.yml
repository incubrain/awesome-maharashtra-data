title: RESPIN Marathi Dialect-Rich Speech Corpus
homepage: https://respin.iisc.ac.in/
category: speech-audio
description:
  Part of the largest publicly available dialect-rich read-speech corpus for Indian languages, comprising 10,000+
  hours validated audio across 9 languages. Marathi subset covers agriculture and finance domains with dialect-aware phonetic
  lexicons and speaker metadata. Captures rural speech patterns that urban-centric datasets miss.
modality: audio
size: 1,000+ hours Marathi speech; dialect tags; speaker metadata
language:
  - mr
license: Research (IISc / Gates Foundation)
ai_use_cases:
  - Dialect-aware Marathi speech recognition
  - Rural voice interface development
  - Agricultural domain ASR
  - Speaker diarization with dialect identification
maharashtra_specific: false
extraction_status: ready
