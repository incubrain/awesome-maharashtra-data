direct_download_url: ""
paper_url: ""
github_url: https://github.com/facebookresearch/flores
organization: Meta AI
format: CSV/JSON
update_frequency: static
citation: ""
last_verified: "2026-03-07"
schema:
  - field: sentence
    type: string
    description: Sentence in source/target language
  - field: id
    type: int
    description: Sentence ID aligned across 200 languages
starter_idea: Benchmark Marathi machine translation quality against 200 languages using the FLORES-200 evaluation set.
build_ideas:
  - Create a Marathi MT evaluation framework using FLORES-200 with automatic metrics and human evaluation
  - Develop a cross-lingual transfer study measuring how Marathi MT benefits from related language data
  - Build a translation difficulty analyzer identifying which FLORES-200 sentences are hardest to translate to/from Marathi
quick_start:
  "from datasets import load_dataset\nds = load_dataset('facebook/flores', 'mar_Deva')\nprint(f'Dev: {len(ds[\"\
  dev\"])}, DevTest: {len(ds[\"devtest\"])}')\nfor ex in list(ds['devtest'])[:3]:\n    print(f'[{ex[\"id\"]}] {ex[\"sentence\"\
  ][:80]}...')\n"
