title: FLORES-200 Benchmark
homepage: https://huggingface.co/datasets/facebook/flores
category: benchmarks-fairness-dialects-tools
description:
  Marathi — Human-translated evaluation benchmark for machine translation covering 200+ languages including Marathi,
  with 3,001 sentences from diverse web articles
modality: Text (parallel, Marathi)
size: 3,001 sentences, 200+ languages
language:
  - mr
license: CC BY-SA 4.0
ai_use_cases:
  - Machine translation evaluation
  - cross-lingual transfer benchmarking
maharashtra_specific: true
