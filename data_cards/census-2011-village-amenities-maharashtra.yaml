title: Census 2011 Village Amenities - Maharashtra
homepage: https://www.data.gov.in/catalog/village-amenities-census-2011
category: governance-census-demographics-legal
description:
  Village-level amenities data from Census 2011 covering educational facilities (pre-primary through degree colleges),
  medical facilities (PHC, CHC, hospitals), water sources (tap, well, hand pump), banking, post offices, and communication
  infrastructure for all Maharashtra villages.
modality: tabular
size: 43,000+ villages; 100+ amenity variables per village
language:
