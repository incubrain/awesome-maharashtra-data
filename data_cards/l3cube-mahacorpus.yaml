title: L3Cube-MahaCorpus
homepage: https://github.com/l3cube-pune/MarathiNLP
category: language-nlp
description:
  Large-scale Marathi monolingual text corpus with 24.8 million sentences
  and 289 million tokens, curated for language model pretraining.
modality: text
size: 24.8M sentences, 289M tokens
language:
  - mr
license: CC-BY-NC-SA-4.0
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: https://github.com/l3cube-pune/MarathiNLP
organization: L3Cube, Pune
ai_use_cases:
  - Language model pretraining
  - Word embedding training
  - Marathi text generation
  - Transfer learning for downstream NLP tasks
maharashtra_specific: true
format: text
update_frequency: static
citation: ""
last_verified: "2026-03-07"
schema:
  - field: text
    type: string
    description: Marathi text sentence from the corpus
starter_idea: "Train a Marathi text classifier for sentiment or topic detection to monitor Marathi-language social media conversations."
build_ideas:
  - "Build a GPT-style language model for Marathi using this corpus and deploy as a chatbot for agriculture advisory"
  - "Create a text summarization service for Marathi news articles to help busy farmers stay informed"
  - "Develop spell-check and grammar correction tools specifically for Marathi using this clean corpus"
quick_start: |
  # Download from https://github.com/l3cube-pune/MarathiNLP
  with open('MahaCorpus.txt', 'r') as f:
      lines = f.readlines()
  print(f"Total sentences: {len(lines)}")
  for line in lines[:5]:
      print(line.strip())
