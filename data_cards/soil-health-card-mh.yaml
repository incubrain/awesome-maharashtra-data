title: Soil Health Card Portal - Maharashtra
homepage: https://soilhealth.dac.gov.in/soil-health-map/MAHARASHTRA
category: agriculture-rural
description:
  Soil test results for Maharashtra farms including N, P, K, pH, EC, organic
  carbon, and micronutrients at village and district level, covering millions of soil
  samples.
modality: tabular
size: Millions of soil samples across Maharashtra
language:
  - en
license: Government-Open
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: ""
organization: Department of Agriculture & Farmers Welfare, Government of India
ai_use_cases:
  - Precision fertiliser recommendation
  - Soil fertility mapping
  - Crop suitability models
  - Sustainable agriculture planning
maharashtra_specific: true
format: CSV
update_frequency: annual
citation: ""
last_verified: "2026-03-07"
schema:
  - field: village_code
    type: string
    description: Village administrative code
  - field: phosphorus_mg_kg
    type: float
    description: Available phosphorus in mg/kg
  - field: potassium_mg_kg
    type: float
    description: Available potassium in mg/kg
  - field: nitrogen_mg_kg
    type: float
    description: Available nitrogen in mg/kg
  - field: ph
    type: float
    description: Soil pH value (acidity/alkalinity)
  - field: organic_carbon_percent
    type: float
    description: Percentage of organic carbon
starter_idea:
  Build a recommendation engine that suggests fertilizer types and quantities
  based on soil test results and crop choice.
build_ideas:
  - Create a voice-based advisory system in Marathi that tells farmers their soil status
    and improvement recommendations
  - Develop a crop rotation recommendation system using soil health data to improve
    long-term yields
  - Build a subsidy eligibility checker connecting soil quality with government fertilizer
    assistance programs
quick_start: |
  # Download district-level data from https://soilhealth.dac.gov.in/
  import pandas as pd
  df = pd.read_csv('soil_health_mh.csv')
  deficient = df[df['phosphorus_mg_kg'] < 12]
  print(f"Villages with P deficiency: {len(deficient)}")
  print(deficient[['village_code', 'phosphorus_mg_kg']].head())
