title: "L3Cube-MahaSent"
homepage: "https://github.com/l3cube-pune/MarathiNLP"
category: "language-nlp"
description: "Marathi tweet sentiment analysis dataset with ~16,000 tweets labeled as positive, negative, or neutral, used as a benchmark for Marathi sentiment classification."
modality: "text"
size: "~16,000 tweets"
language:
  - mr
license: "CC-BY-NC-SA-4.0"
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: "https://github.com/l3cube-pune/MarathiNLP"
organization: "L3Cube, Pune"
ai_use_cases:
  - "Sentiment analysis"
  - "Opinion mining"
  - "Social media monitoring"
  - "Text classification benchmarking"
maharashtra_specific: true
format: "CSV"
update_frequency: "static"
citation: ""
last_verified: "2026-03-11"

schema:
  - field: "tweet"
    type: "string"
    description: "Marathi tweet text"
  - field: "label"
    type: "string"
    description: "Sentiment label (positive, negative, neutral)"

starter_idea: "Build a real-time Marathi Twitter sentiment tracker that monitors public opinion on trending Maharashtra topics."

build_ideas:
  - "Create a Marathi social media listening tool for political campaigns to gauge voter sentiment across Maharashtra constituencies"
  - "Develop a Marathi customer complaint detector that identifies negative sentiment tweets mentioning Maharashtra businesses and services"
  - "Build a benchmark leaderboard for Marathi sentiment models comparing BERT, RoBERTa, and other architectures on this dataset"

quick_start: |
  from datasets import load_dataset
  ds = load_dataset('l3cube-pune/MahaSent')
  from collections import Counter
  labels = [ex['label'] for ex in ds['train']]
  print(f"Label distribution: {dict(Counter(labels))}")
  for ex in ds['train'][:5]:
      print(f"[{ex['label']}] {ex['tweet'][:80]}...")
