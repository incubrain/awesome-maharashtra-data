title: Wikidata Maharashtra Entities (Knowledge Graph)
homepage: https://www.wikidata.org/wiki/Wikidata:Main_Page
category: agentic-instruction-rag
description:
  Structured knowledge graph with multilingual labels (including Marathi) for Maharashtra entities — people, places,
  organizations, cultural artifacts, administrative divisions. Extractable via SPARQL for RAG systems, entity linking, and
  question answering.
modality: knowledge-graph
size: ~100 GB (full dump), ~500 MB (MH entities subset)
language:
  - mr
  - en
  - hi
license: CC0-1.0
ai_use_cases:
  - Marathi question answering and fact retrieval
  - Entity linking for Marathi NLP pipelines
  - Knowledge-grounded chatbot development
  - Administrative geography lookup
  - Cultural heritage digital catalog
maharashtra_specific: false
extraction_status: subset_needed
huggingface_url: ""
direct_download_url: https://dumps.wikimedia.org/wikidatawiki/entities/
paper_url: ""
github_url: ""
organization: Wikimedia Foundation
format: JSON / RDF
update_frequency: weekly
citation: ""
last_verified: "2026-03-11"
schema:
  - field: entity_id
    type: string
    description: Wikidata Q-identifier
  - field: label_mr
    type: string
    description: Entity label in Marathi
  - field: label_en
    type: string
    description: Entity label in English
  - field: instance_of
    type: string
    description: Entity type (person, place, organization, etc.)
starter_idea: Build a Marathi knowledge graph from Wikidata entities related to Maharashtra for entity linking and QA systems.
build_ideas:
  - Create a Marathi entity disambiguation service using Wikidata for resolving ambiguous mentions in text
  - Develop a Maharashtra knowledge quiz generator using Wikidata facts for educational applications
  - Build a Marathi-English entity alignment tool linking Marathi text mentions to Wikidata structured knowledge
quick_start: 'import requests

  # Wikidata SPARQL endpoint

  url = ''https://query.wikidata.org/sparql''

  query = ''SELECT ?item ?label WHERE { ?item wdt:P131 wd:Q1191 . ?item rdfs:label ?label . FILTER(LANG(?label) = "mr") }
  LIMIT 10''

  print(''Wikidata Maharashtra: Use SPARQL endpoint for queries'')

  '
