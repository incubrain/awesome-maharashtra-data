starter_idea:
  Build an automatic Marathi headline generator for news aggregation platforms to create concise, accurate headlines
  from article text.
build_ideas:
  - Create a Marathi clickbait detector that compares generated headlines against article content to identify misleading titles
  - Develop an SEO-optimized headline suggester for Marathi news publishers that maximizes search visibility
  - Build a multilingual headline comparison tool that generates headlines in both Marathi and English for bilingual news platforms
quick_start:
  "from datasets import load_dataset\nds = load_dataset('ai4bharat/IndicHeadlineGeneration', 'mr', split='train',\
  \ streaming=True)\nfor i, ex in enumerate(ds):\n    print(f\"Headline: {ex['headline'][:60]}\")\n    print(f\"Article: {ex['text'][:80]}...\\\
  n\")\n    if i >= 4: break\n"
