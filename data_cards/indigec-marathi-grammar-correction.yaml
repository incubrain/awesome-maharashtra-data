title: IndiGEC Marathi Grammar Error Correction
homepage: https://aclanthology.org/2025.emnlp-main.1139/
category: language-nlp
description:
  First Marathi grammar error correction dataset, part of a multilingual GEC benchmark covering Hindi, Bengali,
  Marathi, and Tamil. Provides source-target corrected sentence pairs for training spelling and grammar checkers. Fills a
  critical gap since no GEC resources for Marathi previously existed.
modality: text
size: Source-target sentence pairs for grammar correction
language:
  - mr
license: Research (EMNLP 2025)
ai_use_cases:
  - Marathi spell checker development
  - Grammar correction for Marathi text editors
  - Writing assistance tools
  - Automated proofreading
maharashtra_specific: true
extraction_status: ready
huggingface_url: ""
direct_download_url: ""
paper_url: https://aclanthology.org/2025.emnlp-main.1139/
github_url: ""
organization: EMNLP 2025
format: Text (source-target pairs)
update_frequency: static
citation: ""
last_verified: "2026-03-11"
schema:
  - field: incorrect
    type: string
    description: Marathi text with grammatical errors
  - field: correct
    type: string
    description: Grammatically corrected Marathi text
starter_idea: Build a Marathi grammar correction API for word processors and messaging apps used in Maharashtra.
build_ideas:
  - Create a real-time Marathi writing assistant browser extension that highlights and suggests grammar corrections
  - Develop a Marathi language learning app that provides grammar feedback on student writing exercises
  - Build an automated proofreading pipeline for Marathi government document publishing workflows
quick_start:
  "# Download from https://github.com/AI4Bharat/IndicGEC\nfrom datasets import load_dataset\nds = load_dataset('ai4bharat/IndicGEC',\
  \ 'mr')\nfor ex in ds['test'][:5]:\n    print(f\"Incorrect: {ex['incorrect'][:60]}...\")\n    print(f\"Correct: {ex['correct'][:60]}...\\\
  n\")\n"
