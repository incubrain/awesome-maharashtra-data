title: data.gov.in Crop Production Statistics
homepage: https://www.data.gov.in/catalog/district-wise-season-wise-crop-production-statistics
category: agriculture-rural
description:
  District-wise, season-wise, crop-wise area (ha), production (tonnes), and yield data for Maharashtra from 1997
  onwards
modality: Tabular (CSV/API)
size: ~246K records (all-India); filterable to MH
language:
  - en
license: Gov Open (GODL)
ai_use_cases:
  - Crop yield prediction
  - agro-climatic zone analysis
  - cropping pattern recommendation
maharashtra_specific: true
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: ""
organization: Government of India, Open Government Data Platform
format: CSV
update_frequency: static
citation: ""
last_verified: "2026-03-11"
schema:
  - field: state
    type: string
    description: State name
  - field: district
    type: string
    description: District name
  - field: crop_year
    type: int
    description: Agricultural year
  - field: crop
    type: string
    description: Crop name
  - field: area_ha
    type: float
    description: Area under cultivation in hectares
  - field: production_tonnes
    type: float
    description: Total production in tonnes
starter_idea: Build a comparative crop analytics platform showing Maharashtra's agricultural performance against other states.
build_ideas:
  - Create a crop portfolio optimizer that recommends the best mix of crops for each Maharashtra district based on historical
    yields
  - Develop an agricultural productivity gap analyzer comparing Maharashtra districts to identify improvement opportunities
  - Build a food production security model that forecasts Maharashtra's ability to meet state food demand
quick_start: '# Download from https://data.gov.in/

  import pandas as pd

  df = pd.read_csv(''crop_production_statistics.csv'')

  mh = df[df[''State''] == ''Maharashtra'']

  print(f"Maharashtra: {len(mh)} records")

  print(mh.groupby(''Crop'')[''Production''].sum().sort_values(ascending=False).head())

  '
