title: "L3Cube-MahaEmotions"
homepage: "https://github.com/l3cube-pune/MarathiNLP"
category: "language-nlp"
description: "Marathi emotion recognition dataset with 15,000 samples labeled across 11 emotion categories."
modality: "text"
size: "15,000 samples"
language:
  - mr
license: "CC-BY-NC-SA-4.0"
huggingface_url: ""
direct_download_url: ""
paper_url: ""
