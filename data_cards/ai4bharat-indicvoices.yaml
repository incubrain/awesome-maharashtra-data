---
# Awesome Marathi Datasets - Data Card
# AI4Bharat IndicVoices

# (required) Human-readable dataset name
title: "AI4Bharat IndicVoices"

# (required) URL to the dataset homepage, download page, or HuggingFace page
homepage: "https://huggingface.co/datasets/ai4bharat/IndicVoices"

# (required) Which category file this belongs to (without number prefix)
category: "speech-audio"

# (required) One-line description of the dataset
description: "Large-scale multilingual speech corpus with read, extempore, and conversational audio across 22 Indian languages including Marathi, totaling 7,348 hours."

# (required) Data modality
modality: "speech+text"

# (required) Approximate size with units
size: "7,348 hrs total (22 langs); ~334 hrs/lang median"

# (required) ISO 639-1 language codes
language:
  - mr

# (required) License identifier
license: "CC-BY-4.0"

# HuggingFace dataset URL (if available)
huggingface_url: "https://huggingface.co/datasets/ai4bharat/IndicVoices"

# Direct download URL (if different from homepage)
direct_download_url: ""

# Academic paper URL (arXiv, ACL Anthology, etc.)
paper_url: ""

# GitHub repository URL (if applicable)
github_url: ""

# Organization or author that created/maintains the dataset
organization: "AI4Bharat"

# (required) List of AI/ML use cases this dataset enables
ai_use_cases:
  - "ASR training"
  - "Language identification"
  - "Speaker verification"
  - "Multilingual speech processing"

# Is this dataset already specific to Maharashtra, or does it need filtering?
maharashtra_specific: false

# Format of the data files
format: "WAV"

# How frequently the data is updated (if applicable)
update_frequency: "static"

# BibTeX citation (if available)
citation: ""

# Date this data card was last verified to be accurate (YYYY-MM-DD)
last_verified: "2026-03-11"

schema:
  - field: audio
    type: audio
    description: Audio waveform of the speech recording
  - field: transcript
    type: string
    description: Transcription of the spoken content
  - field: language
    type: string
    description: ISO language code (e.g., mr for Marathi)
  - field: speaker_id
    type: string
    description: Unique speaker identifier
  - field: duration
    type: float
    description: Duration of audio clip in seconds

starter_idea: Build a Marathi voice assistant that handles read, extempore, and conversational speech styles for agricultural advisory services.

build_ideas:
  - "Create a Marathi-Hindi-English code-switching ASR model trained on the conversational speech subset for real-world call center applications"
  - "Develop a speaker diarization system for Marathi meetings and interviews using the multi-speaker conversational data"
  - "Build a speech style classifier that distinguishes read, spontaneous, and conversational Marathi speech for adaptive ASR pipelines"

quick_start: |
  from datasets import load_dataset
  ds = load_dataset('ai4bharat/IndicVoices', 'mr', split='train', streaming=True)
  for i, ex in enumerate(ds):
      print(f"Duration: {ex['duration']:.1f}s, Transcript: {ex['transcript'][:60]}...")
      if i >= 4: break
