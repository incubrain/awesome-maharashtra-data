format: GeoTIFF / NetCDF
update_frequency: periodic
citation: ""
last_verified: "2026-03-11"
schema:
  - field: population
    type: float
    description: Population count per grid cell
  - field: resolution_km
    type: float
    description: Grid resolution (~1km)
  - field: year
    type: int
    description: Reference year (2000, 2005, 2010, 2015, 2020)
starter_idea: Build a population exposure analysis tool for Maharashtra hazards using NASA SEDAC gridded population.
build_ideas:
