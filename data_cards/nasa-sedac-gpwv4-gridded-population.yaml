title: Gridded Population of the World v4 (NASA SEDAC)
homepage: https://sedac.ciesin.columbia.edu/data/collection/gpw-v4
category: governance-census-demographics-legal
description:
  Census-based gridded population counts and density at ~1km (30 arc-second) resolution for 5-year intervals from
  2000 to 2020 with projections to 2025. Essential for disaster risk assessment, urban planning, and service delivery planning
  when overlaid with satellite data for Maharashtra.
modality: gridded
size: ~1km resolution; 5-year intervals 2000-2020; population count + density
language:
  - en
license: CC-BY-4.0
ai_use_cases:
  - Population exposure mapping for flood/drought risk
  - Urbanization tracking in Mumbai/Pune/Nagpur corridors
  - Service delivery gap analysis for rural Maharashtra
  - Night-lights vs population correlation studies
  - Climate vulnerability assessment overlay
maharashtra_specific: false
extraction_status: subset_needed
