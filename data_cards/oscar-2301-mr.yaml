---
# Awesome Marathi Datasets - Data Card
# OSCAR 23.01 (Marathi)

# (required) Human-readable dataset name
title: "OSCAR 23.01 (Marathi)"

# (required) URL to the dataset homepage, download page, or HuggingFace page
homepage: "https://huggingface.co/datasets/oscar-corpus/OSCAR-2301"

# (required) Which category file this belongs to (without number prefix)
category: "language-nlp"

# (required) One-line description of the dataset
description: "Marathi subset of the OSCAR 23.01 web-crawled corpus containing 729,578 documents and 252 million words (4.5 GB), derived from Common Crawl with language filtering."

# (required) Data modality
modality: "text"

# (required) Approximate size with units
size: "729,578 documents, 252M words, 4.5 GB"

# (required) ISO 639-1 language codes
language:
  - mr

# (required) License identifier
license: "CC0-1.0"

# HuggingFace dataset URL (if available)
huggingface_url: "https://huggingface.co/datasets/oscar-corpus/OSCAR-2301"

# Direct download URL (if different from homepage)
direct_download_url: ""

# Academic paper URL (arXiv, ACL Anthology, etc.)
paper_url: ""

# GitHub repository URL (if applicable)
github_url: ""

# Organization or author that created/maintains the dataset
organization: "OSCAR Project (Inria / DFKI)"

# (required) List of AI/ML use cases this dataset enables
ai_use_cases:
  - "Language model pretraining"
  - "Web text analysis"
  - "Text classification"
  - "Corpus linguistics research"

# Is this dataset already specific to Maharashtra, or does it need filtering?
maharashtra_specific: true

# Format of the data files
format: "Parquet"

# How frequently the data is updated (if applicable)
update_frequency: "static"

# BibTeX citation (if available)
citation: ""

# Date this data card was last verified to be accurate (YYYY-MM-DD)
last_verified: "2026-03-11"

schema:
  - field: "text"
    type: "string"
    description: "Web-crawled Marathi text content"
  - field: "meta"
    type: "object"
    description: "Metadata including quality scores, sentence count, and word count"

starter_idea: "Build a Marathi text corpus quality pipeline that deduplicates and filters OSCAR data to create a clean pre-training dataset."

build_ideas:
  - "Create a Marathi Wikipedia content gap detector that compares OSCAR web content topics against existing Wikipedia coverage"
  - "Develop a Marathi writing style analyzer trained on web text to identify formal, informal, and news writing styles"
  - "Build a Marathi corpus for training word embeddings and evaluate them on analogy and similarity benchmarks"

quick_start: |
  from datasets import load_dataset
  ds = load_dataset('oscar-corpus/OSCAR-2301', 'mr', split='train', streaming=True)
  for i, ex in enumerate(ds):
      print(f"Text: {ex['text'][:100]}...")
      print(f"Meta: {ex['meta']}\n")
      if i >= 4: break
