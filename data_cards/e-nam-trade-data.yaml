    point
quick_start: '# Download from https://enam.gov.in/web/dashboard/trade-data

  import pandas as pd

  df = pd.read_csv(''enam_trade.csv'')

  print(f"Trade records: {len(df)}")

  print(df.groupby(''Commodity'')[''Price''].mean().sort_values(ascending=False).head(10))

