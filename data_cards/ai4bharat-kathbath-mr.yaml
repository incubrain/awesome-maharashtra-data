---
# Awesome Marathi Datasets - Data Card
# AI4Bharat Kathbath (Marathi)

# (required) Human-readable dataset name
title: "AI4Bharat Kathbath (Marathi)"

# (required) URL to the dataset homepage, download page, or HuggingFace page
homepage: "https://huggingface.co/datasets/ai4bharat/Kathbath"

# (required) Which category file this belongs to (without number prefix)
category: "speech-audio"

# (required) One-line description of the dataset
description: "Crowdsourced human-labeled ASR dataset for 12 Indian languages including Marathi, collected via the Karya platform with approximately 140 hours per language."

# (required) Data modality
modality: "speech+text"

# (required) Approximate size with units
size: "~140 hrs Marathi (1,684 hrs total across 12 langs)"

# (required) ISO 639-1 language codes
language:
  - mr

# (required) License identifier
license: "CC0-1.0"

# HuggingFace dataset URL (if available)
huggingface_url: "https://huggingface.co/datasets/ai4bharat/Kathbath"

# Direct download URL (if different from homepage)
direct_download_url: ""

# Academic paper URL (arXiv, ACL Anthology, etc.)
paper_url: ""

# GitHub repository URL (if applicable)
github_url: ""

# Organization or author that created/maintains the dataset
organization: "AI4Bharat"

# (required) List of AI/ML use cases this dataset enables
ai_use_cases:
  - "ASR training"
  - "Speech benchmarking"
  - "Voice-based applications"
  - "Marathi speech recognition"

# Is this dataset already specific to Maharashtra, or does it need filtering?
maharashtra_specific: false

# Format of the data files
format: "WAV"

# How frequently the data is updated (if applicable)
update_frequency: "static"

# BibTeX citation (if available)
citation: ""

# Date this data card was last verified to be accurate (YYYY-MM-DD)
last_verified: "2026-03-11"

schema:
  - field: audio
    type: audio
    description: Audio waveform of the speech recording (WAV format)
  - field: sentence
    type: string
    description: Human-verified transcription of the audio
  - field: locale
    type: string
    description: Language locale code (mr_IN for Marathi)
  - field: split
    type: string
    description: Dataset split (train, valid, test_known, test_unknown)

starter_idea: Build a production-ready Marathi speech-to-text API for customer service automation in Maharashtra banks and telecom companies.

build_ideas:
  - "Create a Marathi dictation app for government officials to transcribe meeting notes and official correspondence in real-time"
  - "Develop a voice-based form filling system for illiterate citizens accessing Maharashtra government services"
  - "Build an automated Marathi subtitling service for educational video content from Maharashtra state board schools"

quick_start: |
  from datasets import load_dataset
  ds = load_dataset('ai4bharat/Kathbath', 'mr', split='train', streaming=True)
  for i, ex in enumerate(ds):
      print(f"Sentence: {ex['sentence'][:80]}...")
      if i >= 4: break
