title: "L3Cube-MahaParaphrase"
homepage: "https://github.com/l3cube-pune/MarathiNLP"
category: "language-nlp"
description: "Marathi paraphrase detection dataset with 8,000 sentence pairs labeled for semantic equivalence."
modality: "text"
size: "8,000 sentence pairs"
language:
  - mr
license: "CC-BY-NC-SA-4.0"
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: "https://github.com/l3cube-pune/MarathiNLP"
organization: "L3Cube, Pune"
ai_use_cases:
  - "Paraphrase detection"
  - "Semantic similarity"
  - "Duplicate question detection"
  - "Sentence embeddings evaluation"
maharashtra_specific: true
format: "CSV"
update_frequency: "static"
citation: ""
last_verified: "2026-03-11"

schema:
  - field: "sentence1"
    type: "string"
    description: "First Marathi sentence"
  - field: "sentence2"
    type: "string"
    description: "Second Marathi sentence"
  - field: "label"
    type: "int"
    description: "Whether the sentences are paraphrases (1) or not (0)"

starter_idea: "Build a semantic search engine for Marathi educational content that finds similar questions and answers across textbooks."

build_ideas:
  - "Create a question deduplication system for Marathi Q&A platforms that merges duplicate questions and consolidates answers"
  - "Develop a FAQ matching service that instantly finds whether a customer's Marathi query already has a documented answer"
  - "Build a plagiarism detection tool for Marathi academic submissions that identifies paraphrased content"

quick_start: |
  from datasets import load_dataset
  ds = load_dataset('l3cube-pune/MahaParaphrase')
  for ex in ds['train'][:5]:
      print(f"S1: {ex['sentence1'][:60]}...")
      print(f"S2: {ex['sentence2'][:60]}...")
      print(f"Paraphrase: {bool(ex['label'])}\n")
