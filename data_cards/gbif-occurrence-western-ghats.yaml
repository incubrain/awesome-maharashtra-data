title: GBIF Species Occurrence Records (Western Ghats & Maharashtra)
homepage: https://www.gbif.org/occurrence/search?geometry=POLYGON((72.6%2015.5,80.5%2015.5,80.5%2021.5,72.6%2021.5,72.6%2015.5))
category: environment-climate-disaster
description:
  Global Biodiversity Information Facility occurrence records for Maharashtra and the Western Ghats biodiversity
  hotspot. Contains millions of georeferenced species observations from herbaria, museums, citizen science (iNaturalist),
  and field surveys.
modality: tabular
size: ~5M records (MH bounding box)
language:
  - en
license: Various (CC0, CC BY, CC BY-NC)
ai_use_cases:
  - Biodiversity mapping and conservation priority areas
  - Species distribution modeling for Western Ghats endemics
  - Invasive species early warning
  - Environmental impact assessment
  - Ecotourism planning
maharashtra_specific: false
extraction_status: subset_needed
huggingface_url: ""
direct_download_url: https://www.gbif.org/occurrence/download
paper_url: ""
github_url: ""
organization: GBIF
format: Darwin Core Archive (CSV)
update_frequency: continuous
citation: ""
last_verified: "2026-03-11"
schema:
  - field: species
    type: string
    description: Species scientific name
  - field: latitude
    type: float
    description: Occurrence latitude
  - field: longitude
    type: float
    description: Occurrence longitude
  - field: date
    type: date
    description: Observation date
starter_idea: Build a biodiversity hotspot mapper for Maharashtra's Western Ghats using species occurrence records.
build_ideas:
  - Create an endemic species distribution model for Maharashtra predicting suitable habitats under climate change
  - Develop a conservation priority ranker for Maharashtra forests based on species richness and endemism
  - Build a citizen science biodiversity app that allows users to submit and verify species sightings in Maharashtra
quick_start: '# Download from https://www.gbif.org/

  import pandas as pd

  df = pd.read_csv(''gbif_western_ghats.csv'', sep=''\t'')

  print(f''Occurrences: {len(df)}'')

  print(f''Species: {df["species"].nunique()}'')

  '
