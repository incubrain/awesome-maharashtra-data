title: OpenCelliD Cell Tower Database (India)
homepage: https://opencellid.org/
category: realtime-streams-apis
description:
  World's largest open database of cell towers (40M+ records globally) with geolocations and network metadata.
  India/Maharashtra subset maps digital connectivity coverage, enabling telecom gap analysis and network planning.
modality: tabular
size: ~3 GB (global), ~100 MB (India), ~15 MB (MH subset)
language:
  - en
license: CC BY-SA 4.0
ai_use_cases:
  - Telecom coverage gap identification in rural MH
  - Digital divide analysis by district
  - Cell tower placement optimization
  - Emergency service accessibility mapping
  - Last-mile connectivity planning
maharashtra_specific: false
extraction_status: subset_needed
huggingface_url: ""
direct_download_url: https://opencellid.org/downloads.php
paper_url: ""
github_url: ""
organization: Unwired Labs
format: CSV
update_frequency: continuous
citation: ""
last_verified: "2026-03-11"
schema:
  - field: cell_id
    type: string
    description: Cell tower identifier
  - field: lat
    type: float
    description: Tower latitude
  - field: lon
    type: float
    description: Tower longitude
  - field: radio
    type: string
    description: Radio type (GSM, UMTS, LTE)
starter_idea: Build a telecom coverage gap analyzer for Maharashtra identifying areas with poor mobile connectivity.
build_ideas:
  - Create a digital divide mapper showing Maharashtra regions with limited mobile network access
  - Develop a cell tower site recommendation model optimizing coverage for underserved Maharashtra areas
  - Build a population-weighted connectivity score for Maharashtra villages to prioritize digital inclusion efforts
quick_start: "import pandas as pd

  # Download from https://opencellid.org/

  df = pd.read_csv('opencellid.csv')

  mh = df[(df['lat'] > 15.5) & (df['lat'] < 22.5) & (df['lon'] > 72.5) & (df['lon'] < 81)]

  print(f'Maharashtra towers: {len(mh)}')

  print(mh['radio'].value_counts())

  "
