---
# Awesome Marathi Datasets - Data Card
# mC4 (Marathi)

# (required) Human-readable dataset name
title: "mC4 (Marathi)"

# (required) URL to the dataset homepage, download page, or HuggingFace page
homepage: "https://huggingface.co/datasets/mc4"

# (required) Which category file this belongs to (without number prefix)
category: "language-nlp"

# (required) One-line description of the dataset
description: "Marathi subset of the multilingual Colossal Clean Crawled Corpus (mC4) with approximately 7.8 million documents and 14 billion raw tokens, used for large-scale language model pretraining."

# (required) Data modality
modality: "text"

# (required) Approximate size with units
size: "~7.8M documents, ~14B tokens (raw)"

# (required) ISO 639-1 language codes
language:
  - mr

# (required) License identifier
license: "ODC-BY-1.0"

# HuggingFace dataset URL (if available)
huggingface_url: "https://huggingface.co/datasets/mc4"

# Direct download URL (if different from homepage)
direct_download_url: ""

# Academic paper URL (arXiv, ACL Anthology, etc.)
paper_url: ""

# GitHub repository URL (if applicable)
github_url: ""

# Organization or author that created/maintains the dataset
organization: "Google / Allen AI"

# (required) List of AI/ML use cases this dataset enables
ai_use_cases:
  - "Language model pretraining"
  - "Large-scale text mining"
  - "Unsupervised representation learning"
  - "Marathi LLM training"

# Is this dataset already specific to Maharashtra, or does it need filtering?
maharashtra_specific: true

# Format of the data files
format: "JSON"

# How frequently the data is updated (if applicable)
update_frequency: "static"

# BibTeX citation (if available)
citation: ""

# Date this data card was last verified to be accurate (YYYY-MM-DD)
last_verified: "2026-03-11"

schema:
  - field: "text"
    type: "string"
    description: "Web-crawled Marathi text document"
  - field: "timestamp"
    type: "string"
    description: "Crawl timestamp of the document"
  - field: "url"
    type: "string"
    description: "Source URL of the crawled page"

starter_idea: "Pre-train a Marathi-specific language model on the mC4 corpus to create a foundation model for downstream NLP tasks like classification and QA."

build_ideas:
  - "Create a Marathi domain classifier that categorizes web content by topic (news, government, education, commerce) for targeted corpus curation"
  - "Develop a Marathi text quality scorer that filters high-quality documents from mC4 for cleaner language model training"
  - "Build a Marathi web content analyzer that identifies emerging topics and trends from the crawled corpus for media monitoring"

quick_start: |
  from datasets import load_dataset
  ds = load_dataset('mc4', 'mr', split='train', streaming=True)
  for i, ex in enumerate(ds):
      print(f"URL: {ex['url'][:60]}")
      print(f"Text: {ex['text'][:100]}...\n")
      if i >= 4: break
