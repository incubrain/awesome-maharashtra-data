starter_idea: Build an AQI trend analyzer for Maharashtra cities showing seasonal patterns and long-term improvement or degradation.
build_ideas:
  - Create an outdoor activity recommender for Maharashtra cities that suggests safe exercise times based on AQI forecasts
  - Develop an industrial zone air quality impact model correlating AQI data with industrial activity in Maharashtra
  - Build a policy effectiveness evaluator tracking how emission reduction measures affect AQI in Maharashtra cities
quick_start: "# Download from https://app.cpcbccr.com/

  import pandas as pd

  df = pd.read_csv('cpcb_aqi.csv')

  mh_cities = ['Mumbai', 'Pune', 'Nagpur', 'Nashik', 'Aurangabad']

  mh = df[df['City'].isin(mh_cities)]

  print(mh.groupby('City')['AQI'].mean().sort_values(ascending=False))

  "
