  - field: avg_score
    type: float
    description: Average performance score
starter_idea: Build a learning outcomes analyzer for Maharashtra districts identifying subject-specific strengths and weaknesses.
build_ideas:
  - Create a teacher training needs identifier for Maharashtra based on student performance gaps in NAS
  - Develop a school quality predictor using NAS scores combined with infrastructure and teacher data
  - Build an education intervention recommender targeting specific learning gaps found in Maharashtra NAS results
quick_start: "# Download from https://nas.gov.in/

  import pandas as pd

  df = pd.read_csv('nas_data.csv')

  mh = df[df['State'] == 'Maharashtra']

  print(mh.groupby(['Grade', 'Subject'])['Avg_Score'].mean())

  "
