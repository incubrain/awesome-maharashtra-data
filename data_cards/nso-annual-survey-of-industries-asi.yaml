title: NSO Annual Survey of Industries (ASI)
homepage: https://www.mospi.gov.in/annual-survey-industries
category: economy-labour-finance
description:
  Maharashtra — Factory-level data on manufacturing output, employment, capital investment, and value added from
  registered factories in Maharashtra
modality: Tabular (unit-level data)
size: Factory-level, annual
language:
  - en
license: Open (microdata with registration)
ai_use_cases:
  - Industrial productivity analysis
  - manufacturing sector modelling
  - employment trend forecasting
maharashtra_specific: true
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: ""
organization: National Statistical Office, Government of India
format: CSV
update_frequency: static
citation: ""
last_verified: "2026-03-11"
schema:
  - field: state
    type: string
    description: State name
  - field: industry_code
    type: string
    description: NIC industry classification code
  - field: output_lakh
    type: float
    description: Total output in lakhs
  - field: workers
    type: int
    description: Number of workers
  - field: year
    type: int
    description: Survey year
starter_idea:
  Build a Maharashtra industrial analytics platform showing manufacturing output, employment, and productivity
  trends.
build_ideas:
  - Create an industrial cluster identifier for Maharashtra based on factory concentration and output patterns
  - Develop a labor productivity benchmarking tool comparing Maharashtra industries against national averages
  - Build an industrial growth forecaster predicting which Maharashtra sectors will expand based on ASI trends
quick_start: '# Download from https://mospi.gov.in/

  import pandas as pd

  df = pd.read_csv(''asi_data.csv'')

  mh = df[df[''State''] == ''Maharashtra'']

  print(f''Industries: {mh["Industry_Code"].nunique()}'')

  print(mh.groupby(''Industry_Code'')[''Output_Lakh''].sum().sort_values(ascending=False).head())

  '
