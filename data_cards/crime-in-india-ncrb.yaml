quick_start: '# Download from https://ncrb.gov.in/

  import pandas as pd

  df = pd.read_csv(''crime_india.csv'')

  mh = df[df[''State''] == ''Maharashtra'']

  print(f''Districts: {mh["District"].nunique()}'')

  print(mh.groupby(''Crime_Type'')[''Cases_Registered''].sum().sort_values(ascending=False).head())

