starter_idea: Build a comprehensive Maharashtra health and demographics dashboard using NFHS-5 district-level fact sheets.
build_ideas:
  - Create a nutrition gap mapper for Maharashtra showing stunting, wasting, and anemia hotspots by district
  - Develop a family planning access analyzer identifying Maharashtra districts with unmet contraceptive needs
  - Build a gender equity tracker comparing health outcomes for boys vs girls across Maharashtra districts
quick_start: '# Download from https://rchiips.org/nfhs/

  import pandas as pd

  df = pd.read_csv(''nfhs5_maharashtra.csv'')

  print(f''Indicators: {df["Indicator"].nunique()}'')

  print(df.groupby(''District'')[''Value''].count().head())

  '
schema:
  - field: district
    type: string
    description: District name
  - field: indicator
    type: string
    description: Health/demographic indicator name
  - field: value
    type: float
    description: Indicator value (usually percentage)
  - field: category
    type: string
    description: Population subgroup (urban, rural, gender, etc.)
