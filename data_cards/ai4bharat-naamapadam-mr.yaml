---
# Awesome Marathi Datasets - Data Card
# AI4Bharat Naamapadam (Marathi)

# (required) Human-readable dataset name
title: "AI4Bharat Naamapadam (Marathi)"

# (required) URL to the dataset homepage, download page, or HuggingFace page
homepage: "https://huggingface.co/datasets/ai4bharat/naamapadam"

# (required) Which category file this belongs to (without number prefix)
category: "language-nlp"

# (required) One-line description of the dataset
description: "Large-scale Marathi NER dataset with 455,200 training sentences annotated across 3 entity types (PER, LOC, ORG), part of the largest publicly available Indic NER dataset."

# (required) Data modality
modality: "text"

# (required) Approximate size with units
size: "455.2K training sentences"

# (required) ISO 639-1 language codes
language:
  - mr

# (required) License identifier
license: "CC0-1.0"

# HuggingFace dataset URL (if available)
huggingface_url: "https://huggingface.co/datasets/ai4bharat/naamapadam"

# Direct download URL (if different from homepage)
direct_download_url: ""

# Academic paper URL (arXiv, ACL Anthology, etc.)
paper_url: ""

# GitHub repository URL (if applicable)
github_url: ""

# Organization or author that created/maintains the dataset
organization: "AI4Bharat"

# (required) List of AI/ML use cases this dataset enables
ai_use_cases:
  - "Named entity recognition"
  - "Information extraction"
  - "Knowledge graph construction"
  - "Document understanding"

# Is this dataset already specific to Maharashtra, or does it need filtering?
maharashtra_specific: true

# Format of the data files
format: "Parquet"

# How frequently the data is updated (if applicable)
update_frequency: "static"

# BibTeX citation (if available)
citation: ""

# Date this data card was last verified to be accurate (YYYY-MM-DD)
last_verified: "2026-03-11"

schema:
  - field: "tokens"
    type: "list[string]"
    description: "List of word tokens in the sentence"
  - field: "ner_tags"
    type: "list[int]"
    description: "BIO-format NER tags for each token (B-PER, I-PER, B-LOC, I-LOC, B-ORG, I-ORG, O)"

starter_idea: "Build a Marathi document entity extractor that automatically identifies people, places, and organizations in government circulars and news articles."

build_ideas:
  - "Create a knowledge graph of Maharashtra politicians, districts, and organizations by extracting entities from Marathi news archives"
  - "Develop an automated contact directory builder that extracts names and locations from Marathi business correspondence"
  - "Build a Marathi-language resume parser that extracts candidate names, companies, and locations for recruitment platforms"

quick_start: |
  from datasets import load_dataset
  ds = load_dataset('ai4bharat/naamapadam', 'mr', split='train', streaming=True)
  label_names = ['O', 'B-PER', 'I-PER', 'B-ORG', 'I-ORG', 'B-LOC', 'I-LOC']
  for i, ex in enumerate(ds):
      entities = [(t, label_names[n]) for t, n in zip(ex['tokens'], ex['ner_tags']) if n != 0]
      print(f"Entities: {entities[:5]}")
      if i >= 4: break
