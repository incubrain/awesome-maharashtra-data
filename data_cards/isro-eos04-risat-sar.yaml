title: ISRO EOS-04 (RISAT-1A) C-band SAR
homepage: https://bhoonidhi.nrsc.gov.in/
category: geospatial-gis
description:
  Indian C-band Synthetic Aperture Radar satellite (follow-on to RISAT-1) with StripMAP, ScanSAR, and Spotlight
  imaging modes. Provides all-weather observation capability with derived products including 500m operational soil moisture.
  Free open data available via Bhoonidhi for coarser-than-5m resolution modes.
modality: satellite-imagery
size: 1-50m resolution depending on mode; 12-day revisit; India-focused coverage
language:
  - en
license: OGL-India (ISRO)
ai_use_cases:
  - Flood mapping during Maharashtra monsoon
  - Rice crop area monitoring using temporal SAR
  - Soil moisture mapping at 500m resolution
  - Urban area change detection
  - Dam and reservoir monitoring
maharashtra_specific: false
extraction_status: subset_needed
huggingface_url: ""
direct_download_url: https://bhoonidhi.nrsc.gov.in/bhoonidhi/index.html
paper_url: ""
github_url: ""
organization: Indian Space Research Organisation (ISRO)
format: GeoTIFF
update_frequency: 12 days
citation: ""
last_verified: "2026-03-11"
schema:
  - field: backscatter
    type: float
    description: SAR backscatter value in dB
  - field: polarization
    type: string
    description: Polarization mode (HH, VV, HV, VH)
  - field: resolution_m
    type: float
    description: Spatial resolution in meters
starter_idea:
  Build an all-weather crop monitoring system for Maharashtra using RISAT SAR data that works through monsoon
  clouds.
build_ideas:
  - Create a rice paddy area mapper for Maharashtra using SAR's sensitivity to standing water in paddy fields
  - Develop a soil moisture estimator from SAR backscatter for irrigation scheduling in Maharashtra
  - Build a flood mapping system using RISAT SAR for rapid damage assessment during Maharashtra monsoon floods
