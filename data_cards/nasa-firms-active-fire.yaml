title: NASA FIRMS Active Fire Data (MODIS/VIIRS)
homepage: https://firms.modaps.eosdis.nasa.gov/
category: environment-climate-disaster
description:
  Near real-time active fire detections from MODIS and VIIRS satellites at 375m-1km resolution, updated every 3
  hours. Maharashtra subset tracks agricultural stubble burning, forest fires in Western Ghats, and industrial fire incidents.
modality: tabular
size: ~10 GB/year (global), ~50 MB (MH subset)
language:
  - en
license: Open (NASA)
ai_use_cases:
  - Crop residue burning monitoring and compliance
  - Forest fire early detection in Western Ghats
  - Air quality impact from agricultural fires
  - Industrial fire incident mapping
  - Seasonal fire risk prediction
maharashtra_specific: false
extraction_status: subset_needed
huggingface_url: ""
direct_download_url: https://firms.modaps.eosdis.nasa.gov/download/
paper_url: ""
github_url: ""
organization: NASA LANCE
format: CSV / SHP / KML
update_frequency: near-real-time (3 hours)
citation: ""
last_verified: "2026-03-11"
schema:
  - field: latitude
    type: float
    description: Fire detection latitude
  - field: longitude
    type: float
    description: Fire detection longitude
  - field: brightness
    type: float
    description: Fire brightness temperature in Kelvin
  - field: confidence
    type: string
    description: Detection confidence (low, nominal, high)
  - field: acq_date
    type: date
    description: Detection date
starter_idea: Build a real-time forest fire monitoring system for Maharashtra using NASA FIRMS satellite fire detections.
build_ideas:
  - Create a fire season forecaster for Maharashtra forests correlating fire occurrences with drought and temperature data
  - Develop a crop residue burning tracker for Maharashtra agricultural regions using FIRMS fire data
  - Build a fire response optimizer for Maharashtra forest department routing firefighting resources based on active fire data
quick_start: "import requests

  # NASA FIRMS API

  url = 'https://firms.modaps.eosdis.nasa.gov/api/area'

  print('NASA FIRMS: https://firms.modaps.eosdis.nasa.gov/')

  print('Near real-time active fire data globally')

  "
