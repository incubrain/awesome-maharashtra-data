title: ALOS PALSAR DEM (JAXA)
homepage: https://www.eorc.jaxa.jp/ALOS/en/dataset/aw3d30/aw3d30_e.htm
category: geospatial-gis
description:
  ALOS World 3D 30m (AW3D30) digital surface model derived from ALOS PRISM stereo imagery by JAXA, providing 30m
  resolution global elevation data. Alternative to SRTM with better accuracy in some terrain types. The higher-res 12.5m PALSAR
  RTC DEM is also available via ASF.
modality: satellite-imagery
size: 30m resolution (AW3D30); 12.5m (PALSAR RTC via ASF); global coverage
language:
  - en
license: Open (JAXA)
ai_use_cases:
  - Flood risk modeling in river basins
  - Watershed delineation for irrigation planning
  - Terrain analysis for infrastructure projects
  - Slope stability assessment in Western Ghats
  - Urban elevation profiling
maharashtra_specific: false
extraction_status: subset_needed
