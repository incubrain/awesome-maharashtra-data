    type: string
    description: Spectral band name (B02-Blue, B03-Green, B04-Red, B08-NIR, etc.)
  - field: resolution_m
    type: int
    description: Spatial resolution (10m, 20m, or 60m)
  - field: acquisition_date
    type: date
