---
# Awesome Marathi Datasets - Data Card
# Mozilla Common Voice (Marathi)

# (required) Human-readable dataset name
title: "Mozilla Common Voice (Marathi)"

# (required) URL to the dataset homepage, download page, or HuggingFace page
homepage: "https://commonvoice.mozilla.org/en/datasets"

# (required) Which category file this belongs to (without number prefix)
category: "speech-audio"

# (required) One-line description of the dataset
description: "Crowd-sourced read-speech recordings with validated transcriptions for Marathi, with approximately 30 hours total and 21 hours validated, part of Mozilla's open voice dataset initiative."

# (required) Data modality
modality: "speech+text"

# (required) Approximate size with units
size: "~30 hrs total, ~21 hrs validated"

# (required) ISO 639-1 language codes
language:
  - mr

# (required) License identifier
license: "CC0-1.0"

# HuggingFace dataset URL (if available)
huggingface_url: "https://huggingface.co/datasets/mozilla-foundation/common_voice_17_0"

# Direct download URL (if different from homepage)
direct_download_url: ""

# Academic paper URL (arXiv, ACL Anthology, etc.)
paper_url: ""

# GitHub repository URL (if applicable)
github_url: ""

# Organization or author that created/maintains the dataset
organization: "Mozilla Foundation"

# (required) List of AI/ML use cases this dataset enables
ai_use_cases:
  - "ASR training"
  - "Speaker identification"
  - "Pronunciation modeling"
  - "Voice interface development"

# Is this dataset already specific to Maharashtra, or does it need filtering?
maharashtra_specific: true

# Format of the data files
format: "WAV"

# How frequently the data is updated (if applicable)
update_frequency: "monthly"

# BibTeX citation (if available)
citation: ""

# Date this data card was last verified to be accurate (YYYY-MM-DD)
last_verified: "2026-03-11"

schema:
  - field: "audio"
    type: "audio"
    description: "Audio waveform of the speech recording (MP3)"
  - field: "sentence"
    type: "string"
    description: "Reference text that was read aloud"
  - field: "up_votes"
    type: "int"
    description: "Number of validation up-votes"
  - field: "down_votes"
    type: "int"
    description: "Number of validation down-votes"
  - field: "age"
    type: "string"
    description: "Speaker's age range (if provided)"
  - field: "gender"
    type: "string"
    description: "Speaker's gender (if provided)"

starter_idea: "Build a lightweight Marathi voice interface for feature phones that works with limited compute, targeting rural Maharashtra users."

build_ideas:
  - "Create a Marathi pronunciation assessment tool for language learners that scores speech accuracy against validated recordings"
  - "Develop a voice-controlled Marathi search engine for accessing government schemes and agricultural information hands-free"
  - "Build a Marathi TTS training pipeline using the validated recordings as high-quality reference for text-to-speech synthesis"

quick_start: |
  from datasets import load_dataset
  ds = load_dataset('mozilla-foundation/common_voice_17_0', 'mr', split='train', streaming=True)
  for i, ex in enumerate(ds):
      print(f"Sentence: {ex['sentence']}")
      print(f"Votes: +{ex['up_votes']}/-{ex['down_votes']}\n")
      if i >= 4: break
