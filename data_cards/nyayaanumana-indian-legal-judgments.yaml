title: NyayaAnumana Indian Legal Judgment Prediction
homepage: https://github.com/ShubhamKumarNigam/NyayaAnumana-and-INLegalLlama
category: governance-census-demographics-legal
description:
  Largest Indian legal judgment prediction dataset with 702,945 preprocessed court cases from Supreme Court, High
  Courts, Tribunals, and District Courts (collected from Indian Kanoon up to April 2024). Includes Maharashtra cases from
  Bombay High Court and district courts with structured judgment outcome labels.
modality: text
size: 702,945 preprocessed court cases with structured labels
language:
  - en
license: Research (COLING 2025)
ai_use_cases:
  - Court judgment prediction for Maharashtra cases
  - Legal outcome forecasting
  - Case law similarity search
  - Legal trend analysis across Bombay High Court
maharashtra_specific: false
extraction_status: ready
huggingface_url: ""
direct_download_url: ""
paper_url: https://arxiv.org/abs/2412.08385
github_url: https://github.com/ShubhamKumarNigam/NyayaAnumana-and-INLegalLlama
organization: COLING 2025
format: Text + structured annotations
update_frequency: static
citation: ""
last_verified: "2026-03-11"
schema:
  - field: judgment_text
    type: string
    description: Full judgment text
  - field: court
    type: string
    description: Court name
  - field: case_type
    type: string
    description: Type of case
  - field: decision
    type: string
    description: Case decision/outcome
starter_idea: Build a legal precedent search engine for Bombay High Court judgments enabling semantic search over case law.
build_ideas:
  - Create a case outcome predictor for Maharashtra courts using historical judgment patterns and NLP analysis
  - Develop a legal argument extractor that identifies key reasoning chains in Bombay High Court judgments
  - Build a judgment complexity scorer helping lawyers estimate case difficulty based on similar past judgments
