---
# Awesome Marathi Datasets - Data Card Template
# Copy this file to data_cards/<dataset-slug>.yaml and fill in all fields.
# Fields marked (required) must be filled. Others are optional but encouraged.

# (required) Human-readable dataset name
title: ""

# (required) URL to the dataset homepage, download page, or HuggingFace page
homepage: ""

# (required) Which category file this belongs to (without number prefix)
# One of: language-nlp, speech-audio, vision-ocr-multimodal, geospatial-gis,
#   agriculture-rural, health-nutrition, education-skills, economy-labour-finance,
#   environment-climate-disaster, transport-urban-infrastructure,
#   governance-census-demographics-legal, culture-media-tourism-heritage,
#   realtime-streams-apis, agentic-instruction-rag, benchmarks-fairness-dialects-tools
category: ""

# (required) One-line description of the dataset
description: ""

# (required) Data modality
# Examples: text, parallel-text, speech, speech+text, image, geospatial,
#   tabular, pdf, api, video, multimodal
modality: ""

# (required) Approximate size with units
# Examples: "289M tokens", "1.2K hours", "50K images", "3.2M rows", "15 GB"
size: ""

# (required) ISO 639-1 language codes
language:
  - mr

# (required) License identifier
# Examples: CC-BY-4.0, CC0-1.0, CC-BY-NC-SA-4.0, MIT, Apache-2.0, ODbL-1.0,
#   Government-Open, Public-Domain, Unknown
license: ""

# HuggingFace dataset URL (if available)
huggingface_url: ""

# Direct download URL (if different from homepage)
direct_download_url: ""

# Academic paper URL (arXiv, ACL Anthology, etc.)
paper_url: ""

# GitHub repository URL (if applicable)
github_url: ""

# Organization or author that created/maintains the dataset
organization: ""

# (required) List of AI/ML use cases this dataset enables
# Examples: LLM pre-training, Sentiment analysis, NER, Machine translation,
#   ASR training, TTS training, Crop yield prediction, Document OCR,
#   RAG knowledge base, Geospatial analysis
ai_use_cases:
  - ""

# Is this dataset already specific to Maharashtra, or does it need filtering?
# true = Maharashtra/Marathi specific, ready to use
# false = Global/India-wide, needs extraction/filtering for Maharashtra
maharashtra_specific: true

# Format of the data files
# Examples: CSV, JSON, Parquet, JSONL, WAV, GeoJSON, Shapefile, GeoTIFF, PDF, Excel
format: ""

# How frequently the data is updated (if applicable)
# Examples: static, annual, monthly, daily, real-time
update_frequency: "static"

# BibTeX citation (if available)
citation: ""

# Date this data card was last verified to be accurate (YYYY-MM-DD)
last_verified: ""
