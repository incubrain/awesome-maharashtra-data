direct_download_url: https://bhoonidhi.nrsc.gov.in/bhoonidhi/index.html
paper_url: ""
github_url: ""
organization: Indian Space Research Organisation (ISRO)
format: GeoTIFF
update_frequency: 24 days (single satellite); continuous archive since 2003
citation: ""
last_verified: "2026-03-11"
schema:
  - field: band
    type: string
    description: Spectral band (Green, Red, NIR, SWIR)
  - field: resolution_m
    type: float
    description: Spatial resolution (23.5m LISS-III, 56m AWiFS)
  - field: acquisition_date
    type: date
