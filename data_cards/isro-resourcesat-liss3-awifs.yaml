starter_idea:
  Build a crop classification model for Maharashtra using LISS-III multi-spectral imagery for kharif and rabi
  seasons.
build_ideas:
  - Create a vegetation health monitor using LISS-III NDVI time-series for Maharashtra forest and crop assessment
  - Develop a water body extent tracker using AWiFS wide-swath imagery for Maharashtra reservoir monitoring
  - Build a wasteland reclamation progress tracker using multi-temporal LISS-III land cover classification
