title: ISRO Resourcesat LISS-3 / AWiFS
homepage: https://bhoonidhi.nrsc.gov.in/
category: agriculture-rural
description:
  Indian multispectral satellite imagery from Resourcesat-1/2/2A providing 24m (LISS-3) and 56m (AWiFS) resolution
  data optimized for Indian agriculture, forestry, and water resource monitoring. Free open data via Bhoonidhi. Offers spectral
  bands specifically selected for Indian crop and land cover characterization.
modality: satellite-imagery
size: 24m (LISS-3) and 56m (AWiFS) resolution; continuous India coverage since 2003
language:
  - en
license: OGL-India (free open data)
ai_use_cases:
  - Crop type classification across Maharashtra districts
  - Seasonal vegetation index time-series analysis
  - Irrigation extent mapping
  - Land use/land cover change detection over 20+ years
  - Forest cover monitoring in Western Ghats
maharashtra_specific: false
extraction_status: subset_needed
