title: AI4Bharat IndicCorp v2 (Marathi)
homepage: https://huggingface.co/datasets/ai4bharat/IndicCorpV2
category: language-nlp
description:
  Marathi subset of the massive 20.9 billion token multilingual corpus
  covering 24 Indic languages, collected from diverse web sources for language model
  pretraining.
modality: text
size: Part of 20.9B token multilingual corpus
language:
  - mr
license: CC0-1.0
huggingface_url: https://huggingface.co/datasets/ai4bharat/IndicCorpV2
direct_download_url: ""
paper_url: ""
github_url: ""
organization: AI4Bharat
ai_use_cases:
  - Language model pretraining
  - Word embedding training
  - Text classification
  - Transfer learning for Marathi NLP
maharashtra_specific: true
format: Parquet
update_frequency: static
citation: ""
last_verified: "2026-03-07"
schema:
  - field: text
    type: string
    description: Marathi text document from the web-crawled corpus
starter_idea: "Train a large Marathi language model on this corpus and fine-tune it for downstream NLP tasks like summarization and QA."
build_ideas:
  - "Fine-tune a GPT-style model on this data to create a Marathi text generation service for content creation"
  - "Use this corpus to pre-train domain-specific embeddings for Marathi semantic search applications"
  - "Build a Marathi autocomplete and writing assistant powered by a language model trained on this corpus"
quick_start: |
  from datasets import load_dataset
  ds = load_dataset('ai4bharat/IndicCorpV2', 'mr', streaming=True)
  for i, ex in enumerate(ds['train']):
      print(f"Text: {ex['text'][:150]}...")
      if i >= 2: break
