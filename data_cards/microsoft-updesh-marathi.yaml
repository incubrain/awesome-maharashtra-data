title: Microsoft Updesh (Marathi LLM Post-Training)
homepage: https://huggingface.co/datasets/microsoft/Updesh_beta
category: agentic-instruction-rag
description:
  Large-scale synthetic dataset for LLM post-training in 13 Indic languages including Marathi. Integrates translated
  reasoning data and synthesized open-domain generative content with multi-stage quality checks (language ID, word repetition
  filtering). Designed for LLM alignment and instruction-following.
