title: HMIS (Health Management Information System)
homepage: https://hmis.mohfw.gov.in/
category: health-nutrition
description:
  Monthly facility-level health data from all government health facilities across Maharashtra covering maternal
  health, immunisation, disease reporting
modality: Tabular (web portal)
size: All districts, monthly from 2008
language:
  - en
license: Open Government
ai_use_cases:
  - Health facility performance monitoring
  - disease trend analysis
  - resource allocation models
maharashtra_specific: true
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: ""
organization: Ministry of Health & Family Welfare, Government of India
format: CSV
update_frequency: static
citation: ""
last_verified: "2026-03-11"
schema:
  - field: facility
    type: string
    description: Health facility name
  - field: district
    type: string
    description: District name
  - field: indicator
    type: string
    description: Health indicator name
  - field: value
    type: float
    description: Indicator value
  - field: month
    type: string
    description: Reporting month
starter_idea: Build a health facility performance dashboard for Maharashtra tracking key indicators across all districts.
build_ideas:
  - Create a maternal health risk mapper identifying Maharashtra facilities with below-target institutional delivery rates
  - Develop a disease outbreak early warning system using HMIS data patterns for Maharashtra health facilities
  - Build a health resource allocation optimizer recommending staff and supply distribution across Maharashtra PHCs
quick_start: '# Download from https://hmis.mohfw.gov.in/

  import pandas as pd

  df = pd.read_csv(''hmis_data.csv'')

  mh = df[df[''State''] == ''Maharashtra'']

  print(f''Facilities: {mh["Facility"].nunique()}'')

  print(mh.groupby(''Indicator'')[''Value''].mean().head())

  '
