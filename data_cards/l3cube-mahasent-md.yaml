title: "L3Cube-MahaSent-MD"
homepage: "https://github.com/l3cube-pune/MarathiNLP"
category: "language-nlp"
description: "Multi-domain Marathi sentiment analysis dataset with 60,000 samples across 4 domains, labeled for positive, negative, and neutral sentiment."
modality: "text"
size: "60,000 samples"
language:
  - mr
license: "CC-BY-NC-SA-4.0"
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: "https://github.com/l3cube-pune/MarathiNLP"
organization: "L3Cube, Pune"
ai_use_cases:
  - "Sentiment analysis"
  - "Opinion mining"
  - "Social media monitoring"
  - "Customer feedback classification"
maharashtra_specific: true
format: "CSV"
update_frequency: "static"
citation: ""
last_verified: "2026-03-11"

schema:
  - field: "sentence"
    type: "string"
    description: "Marathi text sentence"
  - field: "label"
    type: "string"
    description: "Sentiment label (positive, negative, neutral)"
  - field: "domain"
    type: "string"
    description: "Source domain (news, social media, reviews, general)"

starter_idea: "Build a Marathi product review sentiment analyzer for e-commerce platforms selling in Maharashtra."

build_ideas:
  - "Create a real-time sentiment dashboard monitoring Marathi social media conversations about agricultural policies and market conditions"
  - "Develop a multi-domain customer feedback classifier that routes Marathi support tickets by sentiment and urgency"
  - "Build a brand reputation tracker that scores sentiment across Marathi news, social media, and review sites"

quick_start: |
  from datasets import load_dataset
  ds = load_dataset('l3cube-pune/MahaSent-md')
  for ex in ds['train'][:5]:
      print(f"[{ex['label']}] {ex['sentence'][:80]}...")
