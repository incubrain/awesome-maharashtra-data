category: agriculture-rural
description:
  India's unified agricultural data platform with anonymized crop-type, plot area, and farmer registry aggregates
  covering 23.5+ crore plots nationwide. Maharashtra is a pilot state with MahaAgriTech integration. Enables personalized
  subsidy delivery and large-scale crop mapping at unprecedented granularity.
