title: ICRISAT VDSA (Village Dynamics in South Asia)
homepage: https://vdsa.icrisat.org/
category: agriculture-rural
description:
  Longitudinal household-level panel data from 4 Maharashtra villages covering income, assets, consumption, and
  agricultural practices over 30+ years
modality: Tabular (CSV/XLS)
size: 864 panel households; 18 villages
language:
  - en
license: Academic open access
ai_use_cases:
  - Poverty dynamics modelling
  - smallholder livelihood analysis
  - climate adaptation studies
maharashtra_specific: true
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: ""
organization: International Crops Research Institute for the Semi-Arid Tropics (ICRISAT)
format: CSV
update_frequency: static
citation: ""
last_verified: "2026-03-11"
schema:
  - field: village_id
    type: string
    description: Village identifier
  - field: household_id
    type: string
    description: Household identifier
  - field: year
    type: int
    description: Survey year
  - field: variable
    type: string
    description: Survey variable name
  - field: value
    type: float
    description: Observed value
starter_idea:
  Build a rural household livelihood analyzer using longitudinal village survey data to understand poverty dynamics
  in Maharashtra.
build_ideas:
  - Create a rural distress early warning system using household-level economic indicators from VDSA villages in Maharashtra
  - Develop a migration prediction model based on village-level economic and agricultural trends
  - Build a policy impact evaluator that measures before/after effects of government interventions on VDSA villages
quick_start: '# Download from http://vdsa.icrisat.org/

  import pandas as pd

  df = pd.read_csv(''vdsa_household.csv'')

  print(f"Records: {len(df)}")

  print(f"Villages: {df[''Village_ID''].nunique()}")

  print(f"Years: {df[''Year''].min()}-{df[''Year''].max()}")

  '
