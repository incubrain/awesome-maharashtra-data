title: AgMarkNet Daily Market Prices
homepage: https://agmarknet.gov.in/
category: agriculture-rural
description:
  Daily wholesale mandi prices (min, max, modal) for 300+ commodities across
  Maharashtra APMCs, with cleaned data also available via CEDA Ashoka API covering
  2000-2023.
modality: tabular
size: Millions of daily price records
language:
  - en
license: Government-Open
huggingface_url: ""
direct_download_url: https://agmarknet.ceda.ashoka.edu.in/
paper_url: ""
github_url: ""
organization:
  Directorate of Marketing & Inspection (DMI), Ministry of Agriculture
  / CEDA Ashoka
ai_use_cases:
  - Price forecasting
  - Market volatility analysis
  - Farmer advisory chatbots
  - Supply chain optimization
maharashtra_specific: false
format: CSV
update_frequency: daily
citation: ""
last_verified: "2026-03-07"
schema:
  - field: date
    type: date
    description: Date of the market price report
  - field: commodity
    type: string
    description: Name of agricultural commodity (onion, soybean, jowar, etc.)
  - field: market
    type: string
    description: APMC mandi name in Maharashtra
  - field: min_price
    type: float
    description: Minimum price in rupees per quintal
  - field: max_price
    type: float
    description: Maximum price in rupees per quintal
  - field: modal_price
    type: float
    description: Modal (most common) price in rupees per quintal
starter_idea: "Build an SMS-based price alert app for farmers to get daily mandi prices in their local language."
build_ideas:
  - "Create a price forecasting model using historical trends to help farmers decide the optimal time to sell"
  - "Build a multi-language mobile app showing regional price variations so farmers can route goods to the best-paying mandi"
  - "Develop a warehouse receipt financing platform that uses live price data to set loan-to-value ratios"
quick_start: |
  # Download from https://agmarknet.ceda.ashoka.edu.in/
  import pandas as pd
  df = pd.read_csv('agmarknet_prices.csv')
  latest = df[df['date'] == df['date'].max()]
  print(latest[['commodity', 'market', 'modal_price']].head(10))
