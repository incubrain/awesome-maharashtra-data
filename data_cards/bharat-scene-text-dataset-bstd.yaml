title: Bharat Scene Text Dataset (BSTD)
homepage: https://github.com/Bhashini-IITJ/BharatSceneTextDataset
category: vision-ocr-multimodal
description:
  Large-scale scene text dataset for 11 Indian languages plus English, sourced from Wikimedia images of Indian
  signboards and street scenes. Includes 5,113 Marathi word annotations with polygon bounding boxes
modality: Image (scene text)
size: 6,582 images; 106K+ word instances
language:
  - mr
license: "Apache-2.0 (images: CC BY-SA 4.0)"
ai_use_cases:
  - Scene text detection
  - script identification
  - end-to-end OCR
maharashtra_specific: true
huggingface_url: ""
direct_download_url: ""
paper_url: ""
github_url: https://github.com/Bhashini-IITJ/BharatSceneTextDataset
organization: IIIT Hyderabad
format: PNG/JPEG
update_frequency: static
citation: ""
last_verified: "2026-03-11"
schema:
  - field: image
    type: image
    description: Street scene image containing text
  - field: bounding_boxes
    type: list[object]
    description: Text region bounding box coordinates
  - field: text
    type: string
    description: Recognized text content
  - field: script
    type: string
    description: Script type (Devanagari, Latin, etc.)
starter_idea:
  Build a Devanagari scene text recognition system for reading Marathi shop signs and street nameplates in urban
  Maharashtra.
build_ideas:
  - Create a real-time Marathi signboard translator app that captures and translates Devanagari text from camera feeds
  - Develop an automated address reader for delivery services that extracts Marathi text from building photographs
  - Build a heritage site signage digitizer that reads and catalogs inscriptions from Maharashtra historical monuments
quick_start:
  "# Bharat Scene Text Dataset\nimport json\nwith open('bstd_annotations.json') as f:\n    data = json.load(f)\n\
  print(f'Total images: {len(data)}')\nfor img in list(data.values())[:3]:\n    print(f\"Text regions: {len(img.get('annotations',\
  \ []))}\")\n"
