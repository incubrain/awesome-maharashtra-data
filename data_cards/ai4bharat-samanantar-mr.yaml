title: AI4Bharat Samanantar (Marathi)
homepage: https://huggingface.co/datasets/ai4bharat/samanantar
category: language-nlp
description:
  Largest publicly available English-Marathi parallel corpus with 3.32
  million sentence pairs for machine translation.
modality: parallel-text
size: 3.32M sentence pairs
language:
  - mr
  - en
license: CC0-1.0
huggingface_url: https://huggingface.co/datasets/ai4bharat/samanantar
direct_download_url: ""
paper_url: ""
github_url: ""
organization: AI4Bharat
ai_use_cases:
  - Machine translation
  - Cross-lingual transfer learning
  - Bilingual dictionary extraction
  - Parallel corpus mining
maharashtra_specific: true
format: Parquet
update_frequency: static
citation: ""
last_verified: "2026-03-07"
schema:
  - field: src
    type: string
    description: Source sentence in English
  - field: tgt
    type: string
    description: Parallel translation in Marathi
  - field: src_lang
    type: string
    description: Source language code (en)
  - field: tgt_lang
    type: string
    description: Target language code (mr)
  - field: data_source
    type: string
    description: Origin corpus source (e.g. wikimatrix, pib, mkb)
starter_idea: "Build a Marathi-English translation API for agricultural advisories and government notices in real-time."
build_ideas:
  - "Create a terminology dictionary extractor that identifies technical terms and their translations for domain-specific glossaries"
  - "Fine-tune a quantized translation model and deploy as a Hugging Face Space for offline Marathi-English translation"
  - "Build a crowdsourcing UI for community validation and improvement of translation pairs"
quick_start: |
  from datasets import load_dataset
  ds = load_dataset('ai4bharat/samanantar', 'mr')
  for ex in ds['train'][:3]:
      print(f"EN: {ex['src']}")
      print(f"MR: {ex['tgt']}\n")
