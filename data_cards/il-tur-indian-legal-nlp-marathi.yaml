title: IL-TUR Indian Legal NLP Benchmark (Marathi)
homepage: https://huggingface.co/datasets/Exploration-Lab/IL-TUR
category: governance-census-demographics-legal
description:
  Comprehensive Indian legal NLP benchmark with 8 tasks in Marathi including Legal NER, Rhetorical Role Prediction,
  Court Judgment Prediction, Bail Prediction, Legal Statute Identification, Prior Case Retrieval, Summarization, and Legal
  Machine Translation. Far more structured than raw court document text.
modality: text
size: Multi-task benchmark; 8 legal NLP tasks in Marathi
language:
  - mr
  - en
license: Research
ai_use_cases:
  - Marathi legal judgment prediction
  - Court document summarization
  - Legal named entity recognition
  - Bail prediction for Maharashtra courts
  - Legal statute identification
maharashtra_specific: false
extraction_status: ready
