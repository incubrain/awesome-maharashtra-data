title: L3Cube MeCorpus (Marathi-English Code-Mixed)
homepage: https://github.com/l3cube-pune/MarathiNLP
category: language-nlp
description:
  First comprehensive Marathi-English code-mixed NLP ecosystem. MeCorpus provides 10M sentence unsupervised pre-training
  corpus. Includes supervised benchmarks MeSent (~12k tweets for sentiment), MeHate (~12k for hate speech), and MeLID (~12k
  for language identification). Covers both Devanagari and Roman script mixed text.
modality: text
size: 10M unsupervised + ~36K supervised sentences
language:
  - mr
  - en
license: CC-BY-NC-SA-4.0
ai_use_cases:
  - Code-mixed Marathi-English sentiment analysis
  - Bilingual social media monitoring
  - Script-mixed language identification
  - Code-mixed hate speech detection
maharashtra_specific: true
extraction_status: ready
huggingface_url: ""
direct_download_url: ""
paper_url: https://aclanthology.org/2023.findings-ijcnlp.22
github_url: https://github.com/l3cube-pune/MarathiNLP
organization: L3Cube, Pune
format: CSV / JSON
update_frequency: static
citation: ""
last_verified: "2026-03-11"
schema:
  - field: text
    type: string
    description: Code-mixed Marathi-English text
  - field: label
    type: string
    description: Sentiment or task-specific label
starter_idea: Build a code-mixed Marathi-English sentiment analyzer for social media where users frequently mix both languages.
build_ideas:
  - Create a language identification system that tags each word in code-mixed text as Marathi, English, or named entity
  - Develop a code-mixed text normalizer that converts informal mixed-language social media text into standard Marathi
  - Build a sentiment-aware chatbot for Maharashtra e-commerce platforms that understands code-mixed customer queries
quick_start:
  "# Download from https://github.com/l3cube-pune/MarathiNLP\nimport pandas as pd\ndf = pd.read_csv('MECorpus.csv')\n\
  print(f\"Code-mixed samples: {len(df)}\")\nfor _, row in df.head(5).iterrows():\n    print(f\"[{row['label']}] {row['text'][:80]}...\"\
  )\n"
