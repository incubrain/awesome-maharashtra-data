  - Develop a speech-to-text system specifically tuned for Varhadi dialect speakers in Vidarbha region
  - Build a Marathi dialect preservation archive with text, audio, and vocabulary databases for each regional variety
quick_start:
  "# Dialect resources from various academic sources\nimport json\nwith open('marathi_dialects.json') as f:\n \
  \   data = json.load(f)\nfor dialect in ['Varhadi', 'Malvani', 'Deshi']:\n    samples = [d for d in data if d.get('dialect')\
  \ == dialect]\n    print(f\"{dialect}: {len(samples)} samples\")\n"
