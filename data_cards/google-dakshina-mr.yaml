schema:
  - field: native
    type: string
    description: Text in Devanagari script
  - field: romanized
    type: string
    description: Text in Latin/Roman script transliteration
starter_idea:
  Build a Marathi transliteration engine that converts Roman-script Marathi (commonly typed on phones) to proper
  Devanagari.
build_ideas:
  - Create a Marathi keyboard input method that auto-corrects Roman-to-Devanagari transliteration in real-time
  - Develop a social media normalizer that converts code-mixed Roman-Marathi text to standard Devanagari for NLP processing
  - Build a Marathi OCR post-processor that handles mixed-script documents with both Roman and Devanagari text
quick_start:
  "from datasets import load_dataset\nds = load_dataset('google/dakshina', 'mr', split='train')\nfor ex in ds[:5]:\n\
  \    print(f\"Devanagari: {ex['native']}\")\n    print(f\"Roman: {ex['romanized']}\\n\")\n"
